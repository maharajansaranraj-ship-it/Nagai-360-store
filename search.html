<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { @apply flex items-center gap-4 bg-white p-4 rounded-3xl border border-slate-50 shadow-sm active:scale-95 transition-all mb-3; }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='home.html'" class="p-2 bg-slate-100 rounded-full active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="flex-1 relative">
                <input type="text" id="searchInput" oninput="liveSearch()" autofocus
                    placeholder="Search saree, chudi, western..." 
                    class="w-full py-4 pl-12 pr-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-4 top-4 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </div>
        </div>
    </header>

    <main id="search-results" class="px-6 mt-4">
        </main>

    <div id="default-view">
        <section id="recent-section" class="px-8 mt-4">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-bold text-slate-800 uppercase tracking-widest">Recent Searches</h2>
                <button class="text-[10px] font-bold text-slate-400">CLEAR ALL</button>
            </div>
            <div id="recent-list" class="flex flex-wrap gap-2">
                <span class="px-4 py-2 bg-slate-50 rounded-full text-xs font-semibold text-slate-500 border border-slate-100">Saree</span>
                <span class="px-4 py-2 bg-slate-50 rounded-full text-xs font-semibold text-slate-500 border border-slate-100">Kurti</span>
            </div>
        </section>

        <section class="px-8 mt-10">
            <h2 class="text-sm font-bold text-slate-800 uppercase tracking-widest mb-6">Popular Right Now</h2>
            <div class="space-y-4">
                <div onclick="fillSearch('Saree')" class="flex items-center gap-4 p-2 cursor-pointer group">
                    <div class="w-12 h-12 bg-orange-50 rounded-xl flex items-center justify-center text-orange-500">🔥</div>
                    <p class="text-sm font-bold text-slate-600 group-hover:text-orange-500 transition-colors">Trending Sarees</p>
                </div>
                <div onclick="fillSearch('Western')" class="flex items-center gap-4 p-2 cursor-pointer group">
                    <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-blue-500">✨</div>
                    <p class="text-sm font-bold text-slate-600 group-hover:text-blue-500 transition-colors">Western Collections</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.firebasestorage.app",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allProducts = [];

        // 1. Fetch all products once to make search fast
        db.ref('products').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                allProducts = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                }));
            }
        });

        function fillSearch(val) {
            document.getElementById('searchInput').value = val;
            liveSearch();
        }

        function liveSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const resultsDiv = document.getElementById('search-results');
            const defaultView = document.getElementById('default-view');

            if(query.length > 0) {
                defaultView.style.display = "none";
                resultsDiv.innerHTML = "";

                // Filter products from your database
                const filtered = allProducts.filter(p => 
                    p.name.toLowerCase().includes(query) || 
                    (p.category && p.category.toLowerCase().includes(query)) ||
                    (p.desc && p.desc.toLowerCase().includes(query))
                );

                if(filtered.length > 0) {
                    filtered.forEach(p => {
                        resultsDiv.innerHTML += `
                            <div onclick="window.location.href='product.html?id=${p.id}'" class="product-card">
                                <img src="${p.images ? p.images[0] : (p.img || p.image)}" class="w-16 h-16 rounded-2xl object-cover shadow-sm">
                                <div class="flex-1">
                                    <h4 class="text-sm font-bold text-slate-800">${p.name}</h4>
                                    <p class="text-orange-500 font-black text-xs mt-1">₹${p.price}</p>
                                </div>
                                <div class="p-2 bg-slate-50 rounded-full">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" /></svg>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    resultsDiv.innerHTML = `
                        <div class="text-center mt-20">
                            <p class="text-4xl mb-4">🔍</p>
                            <p class="text-slate-400 text-sm font-bold uppercase tracking-widest">No products found</p>
                        </div>
                    `;
                }
            } else {
                defaultView.style.display = "block";
                resultsDiv.innerHTML = "";
            }
        }
    </script>
</body>
</html>
