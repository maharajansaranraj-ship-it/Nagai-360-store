        <input type="text" id="searchInput" onkeyup="searchOffers()" placeholder="Search deals..." class="w-full p-5 pl-14 bg-white rounded-[2.5rem] outline-none shadow-xl text-sm font-bold">
        <span class="absolute left-12 top-5 text-xl">🔍</span>

    <div id="offers-list" class="px-6 grid grid-cols-2 gap-5">

    <script>

    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allOffers = [];
    let timerInterval = null;

    // 🔥 Function to render the UI
    function renderUI(offers) {
        const list = document.getElementById('offers-list');
        const now = new Date().getTime();
        list.innerHTML = "";

        if (!offers || offers.length === 0) {
            list.innerHTML = "<p class='col-span-2 text-center text-white font-bold opacity-60'>No active deals!</p>";
            return;
        }

        offers.forEach(o => {
            // ❌ Skip if no product ID or expired
            if (!o.pid) return; 
            if (o.endTime && (new Date(o.endTime).getTime() - now <= 0)) return;

            const img = (o.images && o.images[0]) ? o.images[0] : 'https://via.placeholder.com/150';
            const originalPriceDisplay = o.originalPrice ? `₹${o.originalPrice}` : '';

            list.innerHTML += `
            <div class="bg-white p-4 rounded-[2.5rem] shadow-xl active:scale-95 transition-all" onclick="location.href='product.html?id=${o.pid}'">
                <div class="relative mb-3">
                    <img src="${img}" class="w-full h-40 object-cover rounded-[1.8rem]" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="timer-box absolute bottom-2 left-2 bg-slate-900 text-white font-black px-3 py-1 rounded-lg text-[9px] shadow-lg" data-time="${o.endTime}">
                        00h 00m 00s
                    </div>
                </div>
                <h3 class="font-bold text-slate-800 text-[11px] truncate px-1">${o.name || 'Flash Deal'}</h3>
                <div class="flex items-center justify-between mt-1 px-1">
                    <p class="text-orange-500 font-black text-sm">₹${o.price || '0'}</p>
                    <p class="text-slate-300 text-[9px] line-through font-bold">${originalPriceDisplay}</p>
                </div>
            </div>
            `;
        });
    }

    // 🕒 Global Timer Function
    function startGlobalTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const now = new Date().getTime();
            document.querySelectorAll('.timer-box').forEach(el => {
                const endTime = el.getAttribute('data-time');
                if (!endTime || endTime === "undefined") {
                    el.innerHTML = "LIMITED SALE";
                    return;
                }

                const dist = new Date(endTime).getTime() - now;
                if (dist < 0) {
                    el.innerHTML = "EXPIRED";
                } else {
                    const h = Math.floor((dist % 86400000) / 3600000);
                    const m = Math.floor((dist % 3600000) / 60000);
                    const s = Math.floor((dist % 60000) / 1000);
                    el.innerHTML = `${h}h ${m}m ${s}s`;
                }
            });
        }, 1000);
    }

    function loadOffers() {
        db.ref('offers').on('value', snap => {
            const data = snap.val();
            allOffers = [];

            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    allOffers.push(data[id]);
                });
            }
            
            renderUI(allOffers);
            startGlobalTimer();
        });
    }          

    function searchOffers() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allOffers.filter(o => 
            (o.name && o.name.toLowerCase().includes(val))
        );
        renderUI(filtered);
    }

    loadOffers();
</script>

</body>
