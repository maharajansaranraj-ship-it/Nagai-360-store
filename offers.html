<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Offers | Nagai 360</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 pb-20">

    <header class="p-6 flex items-center gap-4 bg-white shadow-sm sticky top-0 z-50">
        <button onclick="history.back()" class="p-2 bg-slate-100 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <h1 class="text-xl font-black italic uppercase tracking-tighter text-slate-800">Flash Offers</h1>
    </header>

    <div id="offers-list" class="p-6 grid grid-cols-1 gap-6">
        </div>

        <script>
        // ✅ Unga Firebase Config inga irukanum
        const db = firebase.database();

        function loadOffers() {
            db.ref('offers').on('value', snap => {
                const list = document.getElementById('offers-list');
                list.innerHTML = "";
                const o = snap.val(); // Direct-ah data-va edukkuron

                if(o) {
                    // Admin-la images array-ah irukku, so images[0] edukkuron
                    const mainImg = o.images ? o.images[0] : 'https://via.placeholder.com/300';
                    
                    list.innerHTML = `
                        <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-slate-100 relative">
                            <div class="absolute top-4 left-4 z-10 bg-orange-500 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Limited</div>
                            <img src="${mainImg}" class="w-full h-64 object-cover">
                            
                            <div class="p-6">
                                <div class="flex justify-between items-end mb-4">
                                    <div>
                                        <h3 class="font-bold text-slate-800 text-lg">${o.name}</h3>
                                        <p class="text-orange-500 font-black text-xl mt-1">₹${o.price} <span class="text-slate-300 text-sm line-through ml-2">₹${o.originalPrice}</span></p>
                                    </div>
                                    <div id="timer-offer" class="text-right font-black text-slate-800 text-xs bg-slate-100 px-3 py-2 rounded-xl">
                                        Loading...
                                    </div>
                                </div>
                                <button onclick="location.href='index.html'" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl text-xs uppercase tracking-[0.2em]">Shop Now</button>
                            </div>
                        </div>
                    `;
                    startCountdown(o.endTime, `timer-offer`);
                } else {
                    list.innerHTML = "<p class='text-center text-slate-400 font-bold'>No Active Offers! 🔥</p>";
                }
            });
        }

        function startCountdown(endTime, elementId) {
            if(!endTime) return;
            setInterval(() => {
                const now = new Date().getTime();
                const dist = new Date(endTime).getTime() - now;
                const el = document.getElementById(elementId);
                if(!el) return;

                if (dist < 0) {
                    el.innerHTML = "EXPIRED";
                    el.classList.add('text-red-500');
                } else {
                    const h = Math.floor((dist % (86400000)) / (3600000));
                    const m = Math.floor((dist % (3600000)) / (60000));
                    const s = Math.floor((dist % (60000)) / 1000);
                    el.innerHTML = `${h}h : ${m}m : ${s}s`;
                }
            }, 1000);
        }

        loadOffers();
    </script>

</body>
</html>
