        if(!firebase.apps.length){ firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        function loadOffers() {
            // ✅ Inga 'offers' nu direct-ah check pandrom
            db.ref('offers').on('value', snap => {
                const list = document.getElementById('offers-list');
                const o = snap.val();

                if(o) {
                    // Images-la first image edukkuron
                    const firstImg = (o.images && o.images[0]) ? o.images[0] : "https://via.placeholder.com/400";
                    
                    list.innerHTML = `
                        <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-slate-100 relative">
                            <div class="absolute top-4 left-4 z-10 bg-orange-500 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Limited Deal</div>
                            <img src="${firstImg}" class="w-full h-72 object-cover">
                            
                            <div class="p-6">
                                <div class="flex justify-between items-end mb-4">
                                    <div>
                                        <h3 class="font-black text-slate-800 text-xl">${o.name}</h3>
                                        <p class="text-orange-500 font-black text-2xl mt-1">₹${o.price} <span class="text-slate-300 text-sm line-through ml-2">₹${o.originalPrice}</span></p>
                                    </div>
                                    <div id="timer-offer" class="text-right font-black text-slate-800 text-xs bg-slate-100 px-3 py-2 rounded-xl border border-slate-200">
                                        00h : 00m : 00s
                                    </div>
                                </div>
                                <button onclick="location.href='index.html'" class="w-full bg-slate-900 text-white font-black py-5 rounded-3xl text-xs uppercase tracking-[0.2em] shadow-lg active:scale-95 transition-all">Grab Now 🔥</button>
                            </div>
                        </div>
                    `;
                    startCountdown(o.endTime, "timer-offer");
                } else {
                    list.innerHTML = "<p class='text-center text-slate-400 font-bold'>No Active Offers right now!</p>";
                }
            });
        }

        function startCountdown(endTime, elementId) {
            if(!endTime) return;
            const timerFunc = setInterval(() => {
                const now = new Date().getTime();
                const dist = new Date(endTime).getTime() - now;
                const el = document.getElementById(elementId);
                
                if(!el) { clearInterval(timerFunc); return; }

                if (dist < 0) {
                    el.innerHTML = "EXPIRED";
                    el.classList.add('text-red-500');
                    clearInterval(timerFunc);
                } else {
                    const h = Math.floor((dist % (86400000)) / (3600000));
                    const m = Math.floor((dist % (3600000)) / (60000));
                    const s = Math.floor((dist % (60000)) / 1000);
                    el.innerHTML = `${h}h : ${m}m : ${s}s`;
                }
            }, 1000);
        }

        loadOffers();
    </script>
