<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Product Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #ffffff; overflow-x: hidden; }
        .active-size, .active-color { border-color: #ff8c00 !important; background-color: #fff7ed !important; color: #ff8c00 !important; transform: scale(1.05); }
        .header-overlay { background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 100%); }
        .slider-wrapper { overflow: hidden; position: relative; border-bottom-left-radius: 3rem; border-bottom-right-radius: 3rem; }
        .slider-container { display: flex; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); touch-action: pan-y; }
        .slider-item { min-width: 100%; width: 100%; height: 50vh; object-fit: cover; display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sold-out-overlay { filter: grayscale(1); opacity: 0.6; }
    </style>
</head>
<body class="pb-32">

    <header class="p-5 flex justify-between items-center fixed top-0 w-full z-50 header-overlay">
        <button onclick="history.back()" class="bg-white/90 backdrop-blur-md p-2 rounded-full shadow-lg active:scale-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <button id="wishlist-btn" onclick="toggleWishlist()" class="bg-white/90 backdrop-blur-md p-2 rounded-full shadow-lg active:scale-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" id="heart-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
        </button>
    </header>

    <div id="product-content" class="hidden">
        <div class="slider-wrapper shadow-2xl bg-slate-100" id="slider-main">
            <div id="imageSlider" class="slider-container"></div>
            <div id="sliderDots" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2"></div>
        </div>

        <div class="px-8 pt-6">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <h1 id="product-name" class="text-2xl font-bold text-slate-800 tracking-tight leading-tight">Loading...</h1>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-[0.2em] font-black">Nagai 360 Premium</p>
                </div>
                <div class="text-right">
                    <span id="product-price" class="text-2xl font-black text-orange-500">₹...</span>
                    <p class="text-[9px] text-green-600 font-bold uppercase tracking-widest bg-green-50 px-2 py-1 rounded-md mt-1 italic">Free Delivery</p>
                </div>
            </div>

            <div id="sold-out-badge" class="hidden mt-4 bg-red-100 text-red-600 text-center py-2 rounded-xl text-xs font-black uppercase tracking-widest">
                Out of Stock
            </div>

            <div class="mt-8" id="size-section">
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider mb-4">Select Size</h3>
                <div class="flex gap-4 no-scrollbar overflow-x-auto pb-2" id="size-container"></div>
            </div>

            <div class="mt-6" id="color-section">
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider mb-4">Select Color</h3>
                <div class="flex gap-4 no-scrollbar overflow-x-auto pb-2" id="color-container"></div>
            </div>

            <div class="mt-10">
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider mb-3">Product Info</h3>
                <p id="product-desc" class="text-slate-500 text-sm leading-relaxed font-medium">Fetching details...</p>
            </div>

            <div class="mt-12 mb-10" id="related-section">
                <h3 class="font-bold text-slate-800 text-[10px] uppercase tracking-[0.2em] mb-4">You May Also Like</h3>
                <div id="related-products-list" class="flex gap-4 overflow-x-auto no-scrollbar pb-4">
                    </div>
            </div>

            <div class="mt-8 p-6 bg-slate-900 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-24 h-24 bg-orange-500/10 rounded-full -mr-10 -mt-10"></div>
                <h3 class="text-xs font-bold text-orange-500 uppercase tracking-widest mb-4">Store Privileges</h3>
                <div class="grid grid-cols-2 gap-4 text-white text-[10px] font-medium">
                    <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md">📦</span> COD Available</div>
                    <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md"></span> </div>
                    <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md">✨</span> Premium Quality</div>
                    <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md">💳</span> Secure Payment</div>
                </div>
            </div>
        </div>
    </div>
    <div class="px-6 mb-10">
    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">More for you</h2>
    <div id="more-products-grid" class="grid grid-cols-2 gap-4">
        </div>
</div>


    <div id="error-content" class="hidden flex flex-col items-center justify-center min-h-screen p-10 text-center">
        <div class="text-6xl mb-4">🔍</div>
        <h2 class="text-xl font-bold text-slate-800">Product Not Found</h2>
        <button onclick="location.href='home.html'" class="mt-8 bg-orange-500 text-white px-8 py-4 rounded-full font-bold text-xs uppercase tracking-widest">Back to Home</button>
    </div>

    <div id="footer-buttons" class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl p-6 border-t border-slate-100 flex gap-4 z-[100] hidden">
        <button onclick="addToCart()" class="flex-1 bg-slate-100 text-slate-800 font-bold py-5 rounded-[2rem] transition-all active:scale-95 text-[10px] tracking-widest uppercase">
            Add to Bag
        </button>
        <button onclick="buyNow()" class="flex-1 bg-orange-500 text-white font-bold py-5 rounded-[2rem] shadow-xl shadow-orange-200 transition-all active:scale-95 text-[10px] tracking-widest uppercase">
            Buy Now
        </button>
    </div>

    <script>
    // ✅ Encrypted Firebase Config
    var _0x5623=['\x61\x70\x69\x4b\x65\x79','\x41\x49\x7a\x61\x53\x79\x43\x41\x69\x4c\x58\x30\x47\x51\x6e\x4e\x31\x32\x37\x4e\x31\x53\x78\x43\x4a\x38\x36\x31\x71\x4d\x78\x41\x4f\x30\x73\x76\x4e\x55\x51','\x61\x75\x74\x68\x44\x6f\x6d\x61\x69\x6e','\x66\x66\x2d\x69\x64\x2d\x73\x74\x6f\x72\x65\x2d\x64\x61\x62\x30\x66\x2e\x66\x69\x72\x65\x62\x61\x73\x65\x61\x70\x70\x2e\x63\x6f\x6d','\x64\x61\x74\x61\x62\x61\x73\x65\x55\x52\x4c','\x68\x74\x74\x70\x73\x3a\x2f\x2f\x66\x66\x2d\x69\x64\x2d\x73\x74\x6f\x72\x65\x2d\x64\x61\x62\x30\x66\x2d\x64\x65\x66\x61\x75\x6c\x74\x2d\x72\x74\x64\x62\x2e\x66\x69\x72\x65\x62\x61\x73\x65\x61\x70\x70\x2e\x63\x6f\x6d'];(function(_0x1402be,_0x56230e){var _0x3b18d2=function(_0x22878d){while(--_0x22878d){_0x1402be['push'](_0x1402be['shift']());}};_0x3b18d2(++_0x56230e);}(_0x5623,0x1b3));var _0x3b18=function(_0x1402be,_0x56230e){_0x1402be=_0x1402be-0x0;var _0x3b18d2=_0x5623[_0x1402be];return _0x3b18d2;};
    
    const firebaseConfig = {
        apiKey: _0x3b18('0x1'),
        authDomain: _0x3b18('0x3'),
        projectId: "ff-id-store-dab0f",
        storageBucket: "ff-id-store-dab0f.appspot.com",
        messagingSenderId: "655049193530",
        appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
        databaseURL: _0x3b18('0x5')
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    // Get URL Params
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const userPhone = localStorage.getItem('user_phone');

    let productData = null;
    let selectedSize = "";
    let selectedColor = "";
    let currentIdx = 0;

    // Check if ID exists, then fetch
    if (productId) {
        console.log("Fetching Product:", productId);
        db.ref('products/' + productId).on('value', (snap) => {
            const data = snap.val();
            if (data) {
                displayProduct(data);
            } else {
                // Try fetching from offers if not in products
                db.ref('offers/' + productId).once('value', (oSnap) => {
                    if (oSnap.val()) displayProduct(oSnap.val());
                    else showNotFound();
                });
            }
        }, (error) => {
            console.error("Database Error:", error);
            showNotFound();
        });
    } else {
        showNotFound();
    }

    function displayProduct(data) {
        productData = data;
        console.log("Product Data Loaded:", data.name);
        
        // Remove hidden classes to show content
        document.getElementById('product-content').classList.remove('hidden');
        document.getElementById('footer-buttons').classList.remove('hidden');
        document.getElementById('error-content').classList.add('hidden');

        // Text Content
        document.getElementById('product-name').innerText = data.name;
        document.getElementById('product-price').innerText = "₹" + data.price;
        document.getElementById('product-desc').innerText = data.desc || "Nagai 360 Premium Collection.";

        // Sold Out Check
        if(data.isSoldOut) {
            document.getElementById('footer-buttons').classList.add('hidden');
            document.getElementById('sold-out-badge').classList.remove('hidden');
            document.getElementById('slider-main').classList.add('sold-out-overlay');
        }

        // Image Slider
        const slider = document.getElementById('imageSlider');
        const dots = document.getElementById('sliderDots');
        slider.innerHTML = ""; dots.innerHTML = "";
        
        if (data.images && data.images.length > 0) {
            data.images.forEach((img, i) => {
                slider.innerHTML += `<img src="${img}" class="slider-item">`;
                dots.innerHTML += `<div class="h-1.5 rounded-full transition-all duration-300 ${i === 0 ? 'bg-white w-4' : 'bg-white/40 w-1.5'}"></div>`;
            });
            setupSlider(data.images.length);
        }

        // Sizes & Colors
        renderOptions('size-container', data.sizes, 'size-btn', (val) => selectedSize = val);
        renderOptions('color-container', data.colors, 'color-btn', (val) => selectedColor = val);

        // Load Grids
        loadRelated(data.category, productId);
        loadMore(data.name, productId);
    }

    function renderOptions(containerId, list, btnClass, callback) {
        const cont = document.getElementById(containerId);
        cont.innerHTML = "";
        if (list && list.length > 0) {
            list.forEach((item, i) => {
                const btn = document.createElement('button');
                btn.className = `${btnClass} min-w-[3.5rem] px-4 h-14 border border-slate-100 bg-slate-50 rounded-2xl flex items-center justify-center font-bold text-slate-600 transition-all ${i === 0 ? 'active-size active-color' : ''}`;
                btn.innerText = item;
                if(i === 0) callback(item);
                btn.onclick = function() {
                    document.querySelectorAll('.' + btnClass).forEach(b => b.classList.remove('active-size', 'active-color'));
                    this.classList.add(btnClass === 'size-btn' ? 'active-size' : 'active-color');
                    callback(item);
                };
                cont.appendChild(btn);
            });
        } else {
            cont.innerHTML = "<p class='text-xs text-slate-400'>Standard</p>";
            callback("Standard");
        }
    }

    function showNotFound() {
        document.getElementById('product-content').classList.add('hidden');
        document.getElementById('error-content').classList.remove('hidden');
    }

    // Related & More (Simplified)
    function loadRelated(cat, id) {
        db.ref('products').orderByChild('category').equalTo(cat).limitToFirst(6).once('value', s => {
            const list = document.getElementById('related-products-list');
            list.innerHTML = "";
            s.forEach(child => {
                if(child.key !== id) {
                    const p = child.val();
                    list.innerHTML += `<div onclick="location.href='product.html?id=${child.key}'" class="min-w-[150px]"><img src="${p.images[0]}" class="h-44 w-full object-cover rounded-[2rem] shadow-sm"><h4 class="text-[10px] font-bold mt-2 truncate">${p.name}</h4><p class="text-orange-500 font-black text-[10px]">₹${p.price}</p></div>`;
                }
            });
        });
    }

    function loadMore(name, id) {
        db.ref('products').limitToLast(10).once('value', s => {
            const grid = document.getElementById('more-products-grid');
            grid.innerHTML = "";
            s.forEach(child => {
                if(child.key !== id) {
                    const p = child.val();
                    grid.innerHTML += `<div onclick="location.href='product.html?id=${child.key}'" class="bg-white p-3 border border-slate-100 rounded-[2rem]"><img src="${p.images[0]}" class="h-40 w-full object-cover rounded-[1.5rem] mb-2"><h3 class="font-bold text-xs truncate">${p.name}</h3><p class="text-orange-500 font-black">₹${p.price}</p></div>`;
                }
            });
        });
    }

    function setupSlider(count) {
        const s = document.getElementById('imageSlider');
        const dots = document.getElementById('sliderDots').children;
        let startX = 0;
        s.ontouchstart = e => startX = e.touches[0].clientX;
        s.ontouchend = e => {
            let diff = startX - e.changedTouches[0].clientX;
            if(Math.abs(diff) > 50) {
                if(diff > 0 && currentIdx < count-1) currentIdx++;
                else if(diff < 0 && currentIdx > 0) currentIdx--;
                s.style.transform = `translateX(-${currentIdx * 100}%)`;
                Array.from(dots).forEach((d, i) => d.className = `h-1.5 rounded-full transition-all ${i === currentIdx ? 'bg-white w-4' : 'bg-white/40 w-1.5'}`);
            }
        };
    }

    function addToCart() {
        if(!userPhone) return alert("Please Login First!");
        db.ref('users/'+userPhone+'/cart/'+productId).set({...productData, size: selectedSize, color: selectedColor, qty: 1})
        .then(() => alert("Added to Bag! 🛍️"));
    }

    function buyNow() {
        localStorage.setItem('checkout_item', JSON.stringify({...productData, size: selectedSize, color: selectedColor}));
        window.location.href = 'checkout.html';
    }
</script>

                        
</body>
