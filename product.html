<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Product Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #ffffff; }
        .active-size { border-color: #ff8c00 !important; background-color: #fff7ed !important; color: #ff8c00 !important; }
        .slider-container { display: flex; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .slider-item { min-width: 100%; height: 55vh; object-fit: cover; }
    </style>
</head>
<body class="pb-32">

    <header class="p-5 flex justify-between items-center fixed top-0 w-full z-50">
        <button onclick="history.back()" class="bg-white/80 backdrop-blur-md p-2 rounded-full shadow-lg border border-white/20 active:scale-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <button id="wishlist-btn" onclick="toggleWishlist()" class="bg-white/80 backdrop-blur-md p-2 rounded-full shadow-lg border border-white/20 active:scale-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" id="heart-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
        </button>
    </header>

    <div class="relative overflow-hidden rounded-b-[3.5rem] shadow-xl bg-slate-100">
        <div id="imageSlider" class="slider-container">
            </div>
        <div id="sliderDots" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2"></div>
    </div>

    <div class="px-8 pt-8">
        <div class="flex justify-between items-start mb-2">
            <div>
                <h1 id="product-name" class="text-2xl font-bold text-slate-800 tracking-tight">Loading...</h1>
                <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-[0.2em] font-black">Nagai 360 Premium</p>
            </div>
            <div class="text-right">
                <span id="product-price" class="text-2xl font-black text-orange-500">₹...</span>
                <p class="text-[9px] text-green-600 font-bold uppercase tracking-widest bg-green-50 px-2 py-1 rounded-md mt-1">Free Delivery</p>
            </div>
        </div>

        <div class="mt-8">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider">Select Size</h3>
                <button class="text-[10px] font-bold text-slate-400 underline">SIZE GUIDE</button>
            </div>
            <div class="flex gap-4">
                <button onclick="selectSize(this)" class="w-14 h-14 border border-slate-100 bg-slate-50 rounded-2xl flex items-center justify-center font-bold text-slate-600 transition-all">S</button>
                <button onclick="selectSize(this)" class="w-14 h-14 border border-slate-100 bg-slate-50 rounded-2xl flex items-center justify-center font-bold text-slate-600 active-size">M</button>
                <button onclick="selectSize(this)" class="w-14 h-14 border border-slate-100 bg-slate-50 rounded-2xl flex items-center justify-center font-bold text-slate-600">L</button>
                <button onclick="selectSize(this)" class="w-14 h-14 border border-slate-100 bg-slate-50 rounded-2xl flex items-center justify-center font-bold text-slate-600">XL</button>
            </div>
        </div>

        <div class="mt-10">
            <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider mb-3">Product Info</h3>
            <p id="product-desc" class="text-slate-500 text-sm leading-relaxed font-medium">Fetching details...</p>
        </div>

        <div class="mt-8 p-6 bg-slate-900 rounded-[2.5rem] shadow-xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-24 h-24 bg-orange-500/10 rounded-full -mr-10 -mt-10"></div>
            <h3 class="text-xs font-bold text-orange-500 uppercase tracking-widest mb-4">Store Privileges</h3>
            <div class="grid grid-cols-2 gap-4 text-white text-[10px] font-medium">
                <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md">📦</span> COD Available</div>
                <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md">🔄</span> 7 Days Return</div>
                <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md">✨</span> Premium Quality</div>
                <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md">💳</span> Secure Payment</div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-xl p-6 border-t border-slate-100 flex gap-4 z-[100]">
        <button onclick="addToCart()" class="flex-1 bg-slate-100 text-slate-800 font-bold py-5 rounded-[2rem] flex items-center justify-center gap-3 transition-all active:scale-95 text-xs tracking-widest">
            ADD TO CART
        </button>
        <button onclick="buyNow()" class="flex-1 bg-orange-500 text-white font-bold py-5 rounded-[2rem] shadow-xl transition-all active:scale-95 text-xs tracking-widest uppercase">
            Buy Now
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.firebasestorage.app",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const userPhone = localStorage.getItem('user_phone');
        
        let selectedSize = "M";
        let productData = null;

        // ✅ FETCH PRODUCT DATA DYNAMICALLY
        if(productId) {
            db.ref('products/' + productId).once('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    productData = data;
                    document.getElementById('product-name').innerText = data.name;
                    document.getElementById('product-price').innerText = "₹" + data.price;
                    document.getElementById('product-desc').innerText = data.desc || "Premium quality collection from Nagai 360.";
                    
                    // Setup Images
                    const slider = document.getElementById('imageSlider');
                    const dotsCont = document.getElementById('sliderDots');
                    slider.innerHTML = ""; 
                    dotsCont.innerHTML = "";

                    data.images.forEach((imgUrl, index) => {
                        slider.innerHTML += `<img src="${imgUrl}" class="slider-item">`;
                        const dot = document.createElement('div');
                        dot.className = `w-1.5 h-1.5 rounded-full transition-all duration-300 ${index === 0 ? 'bg-white w-4' : 'bg-white/40'}`;
                        dotsCont.appendChild(dot);
                    });
                    
                    startSlider(data.images.length);
                }
            });
        }

        // ✅ Slider Function
        function startSlider(count) {
            let current = 0;
            const slider = document.getElementById('imageSlider');
            const dots = document.getElementById('sliderDots').children;
            
            setInterval(() => {
                current = (current + 1) % count;
                slider.style.transform = `translateX(-${current * 100}%)`;
                for (let i = 0; i < dots.length; i++) {
                    dots[i].className = `h-1.5 rounded-full transition-all duration-300 ${i === current ? 'bg-white w-4' : 'bg-white/40 w-1.5'}`;
                }
            }, 3500);
        }

        function selectSize(btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active-size'));
            btn.classList.add('active-size');
            selectedSize = btn.innerText;
        }

        function addToCart() {
            if(!userPhone) return alert("Please Login!");
            if(!productData) return;

            db.ref('users/' + userPhone + '/cart/' + productId).set({
                pid: productId,
                name: productData.name,
                price: productData.price,
                img: productData.images[0],
                size: selectedSize,
                qty: 1
            }).then(() => alert("Added to bag! 🛍️"));
        }

        function buyNow() {
            if(!productData) return;
            localStorage.setItem('checkout_item', JSON.stringify({
                pid: productId,
                name: productData.name,
                price: productData.price,
                img: productData.images[0],
                size: selectedSize
            }));
            window.location.href = 'checkout.html';
        }

        function toggleWishlist() {
            const heart = document.getElementById('heart-icon');
            heart.classList.toggle('text-red-500');
            heart.setAttribute('fill', heart.classList.contains('text-red-500') ? 'currentColor' : 'none');
        }
    </script>
</body>
</html>
