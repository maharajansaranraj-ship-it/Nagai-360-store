<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Product Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #ffffff; overflow-x: hidden; }
        .active-size, .active-color { border-color: #ff8c00 !important; background-color: #fff7ed !important; color: #ff8c00 !important; transform: scale(1.05); }
        .header-overlay { background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 100%); }
        .slider-wrapper { overflow: hidden; position: relative; border-bottom-left-radius: 3rem; border-bottom-right-radius: 3rem; }
        .slider-container { display: flex; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); touch-action: pan-y; }
        .slider-item { min-width: 100%; width: 100%; height: 50vh; object-fit: cover; display: block; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sold-out-overlay { filter: grayscale(1); opacity: 0.6; }
    </style>
</head>
<body class="pb-32">

    <header class="p-5 flex justify-between items-center fixed top-0 w-full z-50 header-overlay">
        <button onclick="history.back()" class="bg-white/90 backdrop-blur-md p-2 rounded-full shadow-lg active:scale-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <button id="wishlist-btn" onclick="toggleWishlist()" class="bg-white/90 backdrop-blur-md p-2 rounded-full shadow-lg active:scale-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" id="heart-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
        </button>
    </header>

    <div id="product-content" class="hidden">
        <div class="slider-wrapper shadow-2xl bg-slate-100" id="slider-main">
            <div id="imageSlider" class="slider-container"></div>
            <div id="sliderDots" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2"></div>
        </div>

        <div class="px-8 pt-6">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <h1 id="product-name" class="text-2xl font-bold text-slate-800 tracking-tight leading-tight">Loading...</h1>
                    <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-[0.2em] font-black">Nagai 360 Premium</p>
                </div>
                <div class="text-right">
                    <span id="product-price" class="text-2xl font-black text-orange-500">₹...</span>
                    <p class="text-[9px] text-green-600 font-bold uppercase tracking-widest bg-green-50 px-2 py-1 rounded-md mt-1 italic">Free Delivery</p>
                </div>
            </div>

            <div id="sold-out-badge" class="hidden mt-4 bg-red-100 text-red-600 text-center py-2 rounded-xl text-xs font-black uppercase tracking-widest">
                Out of Stock
            </div>

            <div class="mt-8" id="size-section">
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider mb-4">Select Size</h3>
                <div class="flex gap-4 no-scrollbar overflow-x-auto pb-2" id="size-container"></div>
            </div>

            <div class="mt-6" id="color-section">
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider mb-4">Select Color</h3>
                <div class="flex gap-4 no-scrollbar overflow-x-auto pb-2" id="color-container"></div>
            </div>

            <div class="mt-10">
                <h3 class="font-bold text-slate-800 text-sm uppercase tracking-wider mb-3">Product Info</h3>
                <p id="product-desc" class="text-slate-500 text-sm leading-relaxed font-medium">Fetching details...</p>
            </div>

            <div class="mt-12 mb-10" id="related-section">
                <h3 class="font-bold text-slate-800 text-[10px] uppercase tracking-[0.2em] mb-4">You May Also Like</h3>
                <div id="related-products-list" class="flex gap-4 overflow-x-auto no-scrollbar pb-4">
                    </div>
            </div>

            <div class="mt-8 p-6 bg-slate-900 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-24 h-24 bg-orange-500/10 rounded-full -mr-10 -mt-10"></div>
                <h3 class="text-xs font-bold text-orange-500 uppercase tracking-widest mb-4">Store Privileges</h3>
                <div class="grid grid-cols-2 gap-4 text-white text-[10px] font-medium">
                    <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md">📦</span> COD Available</div>
                    <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md"></span> </div>
                    <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md">✨</span> Premium Quality</div>
                    <div class="flex items-center gap-2"><span class="bg-white/10 p-1 rounded-md">💳</span> Secure Payment</div>
                </div>
            </div>
        </div>
    </div>
    <div class="px-6 mb-10">
    <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">More for you</h2>
    <div id="more-products-grid" class="grid grid-cols-2 gap-4">
        </div>
</div>


    <div id="error-content" class="hidden flex flex-col items-center justify-center min-h-screen p-10 text-center">
        <div class="text-6xl mb-4">🔍</div>
        <h2 class="text-xl font-bold text-slate-800">Product Not Found</h2>
        <button onclick="location.href='home.html'" class="mt-8 bg-orange-500 text-white px-8 py-4 rounded-full font-bold text-xs uppercase tracking-widest">Back to Home</button>
    </div>

    <div id="footer-buttons" class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl p-6 border-t border-slate-100 flex gap-4 z-[100] hidden">
        <button onclick="addToCart()" class="flex-1 bg-slate-100 text-slate-800 font-bold py-5 rounded-[2rem] transition-all active:scale-95 text-[10px] tracking-widest uppercase">
            Add to Bag
        </button>
        <button onclick="buyNow()" class="flex-1 bg-orange-500 text-white font-bold py-5 rounded-[2rem] shadow-xl shadow-orange-200 transition-all active:scale-95 text-[10px] tracking-widest uppercase">
            Buy Now
        </button>
    </div>
<script>
/* ✅ Firebase Config (no fake encryption needed) */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "ff-id-store-dab0f.firebaseapp.com",
  databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com",
  projectId: "ff-id-store-dab0f",
  storageBucket: "ff-id-store-dab0f.appspot.com",
  messagingSenderId: "655049193530",
  appId: "1:655049193530:web:978aaf75e10dd26bb8dd03"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ✅ Get Params */
const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('id');
const userPhone = localStorage.getItem('user_phone');

/* ✅ Variables */
let selectedSize = "";
let selectedColor = "";
let productData = null;
let currentIdx = 0;
let startX = 0;
let isInWishlist = false;

/* =========================
   🔥 FETCH PRODUCT
========================= */
if (productId) {
  db.ref('products').once('value')
    .then(snapshot => {
      let found = false;

      snapshot.forEach(child => {
        if (child.key == productId) {
          displayProduct(child.val());
          found = true;
        }
      });

      if (!found) {
        db.ref('offers').once('value')
          .then(oSnap => {
            oSnap.forEach(child => {
              if (child.key == productId) {
                displayProduct(child.val());
                found = true;
              }
            });

            if (!found) showError();
          });
      }
    })
    .catch(() => showError());
}

  /* ✅ Wishlist check */
  if (userPhone) {
    db.ref('users/' + userPhone + '/wishlist/' + productId)
      .once('value')
      .then(snap => {
        const heart = document.getElementById('heart-icon');
        if (snap.exists()) {
          isInWishlist = true;
          heart.classList.add('text-red-500');
          heart.setAttribute('fill', 'currentColor');
        }
      });
  }
}

/* =========================
   🔥 DISPLAY PRODUCT
========================= */
function displayProduct(data) {
  if (!data) return;

  productData = data;

  document.getElementById('product-content').classList.remove('hidden');
  document.getElementById('error-content').classList.add('hidden');

  document.getElementById('product-name').textContent = data.name || "No Name";
  document.getElementById('product-price').textContent = "₹" + (data.price || 0);
  document.getElementById('product-desc').textContent = data.desc || "Premium quality product.";

  /* Stock */
  const footer = document.getElementById('footer-buttons');
  const badge = document.getElementById('sold-out-badge');

  if (data.isSoldOut) {
    footer.classList.add('hidden');
    badge.classList.remove('hidden');
  } else {
    footer.classList.remove('hidden');
    badge.classList.add('hidden');
  }

  /* Sizes */
  const sizeCont = document.getElementById('size-container');
  sizeCont.innerHTML = "";

  if (data.sizes?.length) {
    data.sizes.forEach((s, i) => {
      if (i === 0) selectedSize = s;
      sizeCont.innerHTML += `<button onclick="selectSize(this)" class="size-btn ${i===0?'active-size':''} min-w-[3.5rem] h-14 border rounded-xl">${s}</button>`;
    });
  } else {
    sizeCont.innerHTML = "<p>Free Size</p>";
    selectedSize = "Free Size";
  }

  /* Colors */
  const colorCont = document.getElementById('color-container');
  colorCont.innerHTML = "";

  if (data.colors?.length) {
    data.colors.forEach((c, i) => {
      if (i === 0) selectedColor = c;
      colorCont.innerHTML += `<button onclick="selectColor(this)" class="color-btn ${i===0?'active-color':''} px-4 h-12 border rounded-xl">${c}</button>`;
    });
  } else {
    colorCont.innerHTML = "<p>Default</p>";
    selectedColor = "Default";
  }

  /* Images */
  const slider = document.getElementById('imageSlider');
  const dots = document.getElementById('sliderDots');
  slider.innerHTML = "";
  dots.innerHTML = "";

  if (data.images?.length) {
    data.images.forEach((img, i) => {
      slider.innerHTML += `<img src="${img}" class="slider-item">`;

      const dot = document.createElement('div');
      dot.className = i === 0 ? "w-4 h-1.5 bg-white rounded-full" : "w-1.5 h-1.5 bg-white/40 rounded-full";
      dots.appendChild(dot);
    });

    setupSlider(data.images.length);
  }

  /* Related + More */
  loadRelatedProducts(data.category, productId);
  loadMoreGrid(data.name, productId);
}

/* =========================
   🔥 ERROR
========================= */
function showError() {
  document.getElementById('product-content').classList.add('hidden');
  document.getElementById('error-content').classList.remove('hidden');
}

/* =========================
   🔥 SLIDER
========================= */
function setupSlider(count) {
  const slider = document.getElementById('imageSlider');
  const dots = document.getElementById('sliderDots').children;

  slider.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
  });

  slider.addEventListener('touchend', e => {
    const diff = startX - e.changedTouches[0].clientX;

    if (Math.abs(diff) > 40) {
      if (diff > 0 && currentIdx < count - 1) currentIdx++;
      else if (diff < 0 && currentIdx > 0) currentIdx--;

      slider.style.transform = `translateX(-${currentIdx * 100}%)`;

      for (let i = 0; i < dots.length; i++) {
        dots[i].className = i === currentIdx
          ? "w-4 h-1.5 bg-white rounded-full"
          : "w-1.5 h-1.5 bg-white/40 rounded-full";
      }
    }
  });
}

/* =========================
   🔥 SELECT
========================= */
function selectSize(btn) {
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active-size'));
  btn.classList.add('active-size');
  selectedSize = btn.textContent;
}

function selectColor(btn) {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active-color'));
  btn.classList.add('active-color');
  selectedColor = btn.textContent;
}

/* =========================
   🔥 CART
========================= */
function addToCart() {
  if (!userPhone) return alert("Login first!");

  db.ref('users/' + userPhone + '/cart/' + productId).set({
    pid: productId,
    name: productData.name,
    price: productData.price,
    img: productData.images?.[0] || "",
    size: selectedSize,
    color: selectedColor,
    qty: 1
  }).then(() => alert("Added to bag 🛍️"));
}

/* =========================
   🔥 BUY NOW
========================= */
function buyNow() {
  localStorage.setItem('checkout_item', JSON.stringify({
    pid: productId,
    name: productData.name,
    price: productData.price,
    img: productData.images?.[0] || "",
    size: selectedSize,
    color: selectedColor
  }));

  location.href = "checkout.html";
}

/* =========================
   🔥 WISHLIST
========================= */
function toggleWishlist() {
  if (!userPhone) return alert("Login first!");

  const ref = db.ref('users/' + userPhone + '/wishlist/' + productId);

  if (isInWishlist) {
    ref.remove();
    isInWishlist = false;
  } else {
    ref.set({
      pid: productId,
      name: productData.name,
      image: productData.images?.[0] || "",
      price: productData.price
    });
    isInWishlist = true;
  }
}
                                       </script>

                        
</body>
</html>
