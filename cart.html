<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Shopping Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfc; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-32">

    <nav class="glass-nav sticky top-0 z-50 p-5 flex items-center border-b border-gray-100">
        <button onclick="window.location.href='home.html'" class="p-2 bg-slate-100 rounded-full mr-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <h1 class="text-xl font-bold text-slate-800">Your Cart (2 Items)</h1>
    </nav>

    <main class="p-5 space-y-4">
        
        <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-slate-50 flex gap-4">
            <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1000" class="w-24 h-28 object-cover rounded-2xl">
            <div class="flex-1 flex flex-col justify-between">
                <div>
                    <h3 class="font-bold text-slate-800">Summer Floral Dress</h3>
                    <p class="text-xs text-slate-400">Size: M | Color: Yellow</p>
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-bold text-orange-500">₹899</span>
                    <div class="flex items-center gap-3 bg-slate-50 px-3 py-1 rounded-full">
                        <button class="text-slate-400 font-bold">-</button>
                        <span class="text-xs font-bold">1</span>
                        <button class="text-slate-900 font-bold">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-slate-50 flex gap-4">
            <img src="https://images.unsplash.com/photo-1539109132314-347f08503241?q=80&w=1000" class="w-24 h-28 object-cover rounded-2xl">
            <div class="flex-1 flex flex-col justify-between">
                <div>
                    <h3 class="font-bold text-slate-800">Casual Denim Jacket</h3>
                    <p class="text-xs text-slate-400">Size: L | Color: Blue</p>
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-bold text-orange-500">₹1,499</span>
                    <div class="flex items-center gap-3 bg-slate-50 px-3 py-1 rounded-full">
                        <button class="text-slate-400 font-bold">-</button>
                        <span class="text-xs font-bold">1</span>
                        <button class="text-slate-900 font-bold">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-10 bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
            <h2 class="font-bold text-slate-800 mb-4">Price Details</h2>
            <div class="space-y-3">
                <div class="flex justify-between text-sm text-slate-500">
                    <span>Total MRP</span>
                    <span>₹2,398</span>
                </div>
                <div class="flex justify-between text-sm text-slate-500">
                    <span>Discount</span>
                    <span class="text-green-500">-₹200</span>
                </div>
                <div class="flex justify-between text-sm text-slate-500">
                    <span>Delivery Charges</span>
                    <span class="text-green-500">FREE</span>
                </div>
                <hr class="border-slate-50 my-2">
                <div class="flex justify-between font-bold text-lg text-slate-800">
                    <span>Total Amount</span>
                    <span>₹2,198</span>
                </div>
            </div>
        </div>

        <div class="bg-blue-50 p-6 rounded-[2rem] border border-blue-100">
            <h3 class="text-xs font-bold text-blue-900 uppercase tracking-widest mb-4">Choose Payment Mode</h3>
            <div class="grid grid-cols-2 gap-3">
                <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-blue-200 cursor-pointer">
                    <input type="radio" name="pay" class="mr-2" checked>
                    <span class="text-xs font-bold text-blue-900">GPay/UPI</span>
                </label>
                <label class="flex items-center justify-center p-3 bg-white rounded-xl border border-blue-200 cursor-pointer">
                    <input type="radio" name="pay" class="mr-2">
                    <span class="text-xs font-bold text-blue-900">Cash (COD)</span>
                </label>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white p-6 border-t border-gray-100 shadow-[0_-15px_40px_rgba(0,0,0,0.05)] flex items-center justify-between">
        <div>
            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Total to Pay</p>
            <p class="text-xl font-extrabold text-slate-800">₹2,198</p>
        </div>
        <button onclick="window.location.href='order-success.html'" class="px-10 py-4 bg-orange-500 text-white font-bold rounded-2xl shadow-lg shadow-orange-200 active:scale-95 transition-all">
            PLACE ORDER
        </button>
    </div>

</body>
</html>
