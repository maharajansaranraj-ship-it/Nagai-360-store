<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass-card w-full max-w-[400px] rounded-[3rem] shadow-2xl p-10 border-t-4 border-orange-500">
        
        <div class="flex flex-col items-center mb-8">
            <div class="w-24 h-24 rounded-full border-4 border-white shadow-xl overflow-hidden mb-4 ring-4 ring-orange-50">
                <img src="1000871212.jpg" alt="Logo" class="w-full h-full object-cover">
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">NAGAI <span class="text-orange-500">360</span></h1>
        </div>

        <div id="phone-container" class="space-y-6">
            <div class="group">
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1">Mobile Number</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-slate-400 font-bold border-r pr-3">+91</span>
                    <input type="tel" id="phoneNumber" placeholder="9876543210" 
                        class="w-full pl-16 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all font-semibold">
                </div>
            </div>
            <div id="recaptcha-container"></div>
            
            <button onclick="sendOTP()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-xl transition-all">
                SEND OTP
            </button>
        </div>

        <div id="otp-container" class="hidden space-y-6 animate-pulse">
            <p class="text-center text-slate-500 text-sm">Enter the code sent to your mobile</p>
            <input type="text" id="otpCode" placeholder="Enter 6-digit OTP" 
                class="w-full px-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 text-center text-2xl font-bold tracking-widest">
            
            <button onclick="verifyOTP()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all">
                VERIFY & LOGIN
            </button>
        </div>

    </div>

    <script>
        // --- Firebase Configuration (IMPORTANT: UNGA CREDENTIALS REPLACE PANNUNGA) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Setup Recaptcha
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            'size': 'invisible'
        });

        let confirmationResult;

        // 1. SEND OTP FUNCTION
        async function sendOTP() {
            const phoneNumber = "+91" + document.getElementById('phoneNumber').value;
            const appVerifier = window.recaptchaVerifier;

            try {
                confirmationResult = await auth.signInWithPhoneNumber(phoneNumber, appVerifier);
                document.getElementById('phone-container').classList.add('hidden');
                document.getElementById('otp-container').classList.remove('hidden');
                alert("OTP Sent!");
            } catch (error) {
                console.error("Error during sendOTP", error);
                alert("Error: " + error.message);
            }
        }

        // 2. VERIFY OTP & REDIRECT
        async function verifyOTP() {
            const code = document.getElementById('otpCode').value;

            try {
                const result = await confirmationResult.confirm(code);
                const user = result.user;
                console.log("User Logged In:", user);
                
                // REDIRECT TO HOME PAGE
                alert("Login Success! Redirecting...");
                window.location.href = 'home.html'; 
                
            } catch (error) {
                console.error("Error during verifyOTP", error);
                alert("Invalid OTP. Try again.");
            }
        }
    </script>
</body>
</html>
