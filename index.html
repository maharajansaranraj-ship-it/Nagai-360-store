<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .input-focus:focus { border-color: #f97316; ring: 2px; ring-color: #fdba74; outline: none; }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass-card w-full max-w-[400px] rounded-[3rem] shadow-2xl p-10 border-t-8 border-orange-500 text-center">
        
        <div class="mb-6">
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">NAGAI 360</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-[0.3em] font-bold mt-1">Premium Identity</p>
        </div>

        <div class="space-y-4">
            <input type="email" id="emailInput" placeholder="Email Address"
                class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl input-focus transition-all text-sm font-medium">

            <input type="password" id="loginPassword" placeholder="Password"
                class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl input-focus transition-all text-sm font-medium">

            <button onclick="handleAuth()" id="authBtn"
                class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-orange-500 transition-all active:scale-95 shadow-lg">
                Access Account
            </button>
        </div>

        <div id="status-box" class="mt-8 hidden">
            <div class="flex flex-col items-center gap-3">
                <div class="w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
                <p id="msg" class="text-xs font-bold text-orange-600 uppercase tracking-widest italic"></p>
            </div>
        </div>

        <p class="mt-8 text-[10px] text-slate-400 font-medium">By continuing, you agree to Nagai 360 Terms</p>
    </div>

<script>
    // ✅ Encrypted Firebase Config (Unga details apply pannittaen)

    if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // 🔥 HANDLE AUTH (LOGIN/SIGNUP)
    function handleAuth() {
        const email = document.getElementById('emailInput').value.trim();
        const pass = document.getElementById('loginPassword').value;

        if(!email.includes("@")) return alert("Valid Email address podu bro! 📧");
        if(pass.length < 6) return alert("Password min 6 characters venum! 🔐");

        document.getElementById("status-box").classList.remove("hidden");
        document.getElementById("msg").innerText = "Checking Credentials...";

        auth.signInWithEmailAndPassword(email, pass)
        .then((user) => {
            checkStatus(user.user.uid);
        })
        .catch(() => {
            // New User Registration
            auth.createUserWithEmailAndPassword(email, pass)
            .then((user) => {
                const uid = user.user.uid;
                db.ref("users/" + uid).set({
                    email: email,
                    status: "pending",
                    joinedAt: new Date().toISOString()
                });
                checkStatus(uid);
            })
            .catch(err => {
                alert(err.message);
                document.getElementById("status-box").classList.add("hidden");
            });
        });
    }

    // 🔥 CHECK STATUS FROM DATABASE
    function checkStatus(uid) {
        db.ref("users/" + uid).on("value", (snap) => {
            const data = snap.val();
            if(!data) {
                document.getElementById("msg").innerText = "Account Access Revoked";
                return;
            }

            if(data.status === "approved") {
                localStorage.setItem("user_uid", uid);
                localStorage.setItem("isLoggedIn", "true");
                window.location.href = "home.html";
            } else {
                document.getElementById("msg").innerText = "Waiting for Admin Approval...";
            }
        });
    }
</script>

</body>
</html>
