<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass-card w-full max-w-[400px] rounded-[3rem] shadow-2xl p-10 border-t-4 border-orange-500 text-center">
        
        <div class="flex flex-col items-center mb-8">
            <div class="w-20 h-20 rounded-full border-4 border-white shadow-lg overflow-hidden mb-4 bg-white">
                <img src="nagai.jpg" alt="Logo" class="w-full h-full object-contain">
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">NAGAI <span class="text-orange-500">360</span></h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Premium Reselling</p>
        </div>

        <div id="auth-section" class="space-y-4">
            <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 py-4 rounded-2xl font-bold text-slate-700 shadow-sm active:scale-95 transition-all">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5">
                Continue with Google
            </button>
            
            <div class="flex items-center gap-2 my-4">
                <div class="flex-1 h-px bg-slate-200"></div>
                <span class="text-[10px] font-bold text-slate-400 uppercase">OR</span>
                <div class="flex-1 h-px bg-slate-200"></div>
            </div>

            <input type="email" id="email" placeholder="Email Address" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 text-sm">
            <input type="password" id="password" placeholder="Password" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 text-sm">
            
            <button onclick="loginWithEmail()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl active:scale-95 transition-all uppercase tracking-widest">
                Login / Sign Up
            </button>
        </div>

        <div id="phone-section" class="hidden space-y-6">
            <div class="text-left">
                <h2 class="text-lg font-bold text-slate-800">One last thing!</h2>
                <p class="text-xs text-slate-500 mb-4">Please verify your mobile number to continue.</p>
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 tracking-widest">Mobile Number</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-slate-400 font-bold border-r pr-3">+91</span>
                    <input type="tel" id="phoneNumber" maxlength="10" placeholder="9876543210" 
                        class="w-full pl-16 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 font-semibold">
                </div>
            </div>
            <button onclick="savePhoneAndGo()" class="w-full bg-orange-500 text-white font-bold py-4 rounded-2xl shadow-xl shadow-orange-200 active:scale-95 transition-all uppercase tracking-widest">
                COMPLETE SETUP
            </button>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.firebasestorage.app",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // 1. Google Login
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then((result) => {
                checkUserPhone(result.user);
            }).catch(err => alert(err.message));
        }

        // 2. Email Login/Signup
        function loginWithEmail() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            if(!email || !pass) return alert("Fill all fields");

            auth.signInWithEmailAndPassword(email, pass)
                .then(res => checkUserPhone(res.user))
                .catch(() => {
                    auth.createUserWithEmailAndPassword(email, pass)
                        .then(res => checkUserPhone(res.res.user))
                        .catch(err => alert(err.message));
                });
        }

        // 3. Check if phone exists in DB
        function checkUserPhone(user) {
            db.ref('users/' + user.uid).once('value', (snap) => {
                const data = snap.val();
                if(data && data.phone) {
                    // Already has phone, go home
                    localStorage.setItem('user_phone', data.phone);
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'home.html';
                } else {
                    // No phone, show phone section
                    document.getElementById('auth-section').classList.add('hidden');
                    document.getElementById('phone-section').classList.remove('hidden');
                }
            });
        }

        // 4. Save Phone Number
        function savePhoneAndGo() {
            const num = document.getElementById('phoneNumber').value;
            const user = auth.currentUser;

            if(num.length < 10) return alert("Enter valid number");

            db.ref('users/' + user.uid).set({
                phone: num,
                username: user.displayName || "Nagai User",
                email: user.email,
                coins: 0,
                joined: new Date().toLocaleString()
            }).then(() => {
                localStorage.setItem('user_phone', num);
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'home.html';
            });
        }
    </script>
</body>
</html>
