<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 Login</title>

    <!-- UI -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase (IMPORTANT) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100">

<div class="bg-white p-8 rounded-xl shadow-lg w-[350px] text-center">

    <h1 class="text-2xl font-bold mb-6">NAGAI 360</h1>

    <input id="email" type="email" placeholder="Enter Email"
        class="w-full p-3 border mb-4 rounded-lg">

    <input id="password" type="password" placeholder="Password"
        class="w-full p-3 border mb-4 rounded-lg">

    <button onclick="login()" 
        class="w-full bg-black text-white py-3 rounded-lg">
        Login / Sign Up
    </button>

    <p id="msg" class="mt-4 text-sm text-gray-500"></p>

</div>

<script>

// 🔥 Firebase Config (YOUR REAL CONFIG)
const firebaseConfig = {
  apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
  authDomain: "ff-id-store-dab0f.firebaseapp.com",
  databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com",
  projectId: "ff-id-store-dab0f",
  storageBucket: "ff-id-store-dab0f.firebasestorage.app",
  messagingSenderId: "655049193530",
  appId: "1:655049193530:web:9a3a0139fbbf6f98b8dd03"
};

// ✅ INIT
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();


// 🔥 LOGIN / SIGNUP
function login() {

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value;

    if(!email.includes("@")) return alert("Valid email podu");
    if(pass.length < 6) return alert("Password min 6 chars");

    auth.signInWithEmailAndPassword(email, pass)

    .then((res) => {
        checkStatus(res.user.uid);
    })

    .catch(() => {

        auth.createUserWithEmailAndPassword(email, pass)
        .then((res) => {

            const uid = res.user.uid;

            db.ref("users/" + uid).set({
                email: email,
                status: "pending"
            });

            checkStatus(uid);
        })

        .catch(err => alert(err.message));
    });
}


// 🔥 APPROVAL CHECK
function checkStatus(uid) {

    db.ref("users/" + uid).on("value", (snap) => {

        const data = snap.val();

        if(!data) {
            document.getElementById("msg").innerText = "Account removed";
            return;
        }

        if(data.status === "approved") {
            localStorage.setItem("login", "true");
            window.location.href = "home.html";
        }
        else {
            document.getElementById("msg").innerText = "Waiting for admin approval...";
        }

    });
}

</script>

</body>
</html>
