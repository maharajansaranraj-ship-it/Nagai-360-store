<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | OTP Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100 p-6">

<div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm text-center">

    <!-- 🔥 LOGO ADDED -->
    <div class="flex flex-col items-center mb-4">
        <div class="w-20 h-20 rounded-full overflow-hidden border-4 border-orange-400 shadow">
            <img src="nagai.jpg" alt="Nagai 360" class="w-full h-full object-cover">
        </div>
        <h1 class="text-lg font-bold mt-2">Nagai 360</h1>
    </div>

    <!-- Phone -->
    <input id="phoneNumber" type="tel" maxlength="10"
        placeholder="Enter Mobile Number"
        class="w-full p-3 border rounded-lg mb-3">

    <!-- OTP -->
    <input id="otp" type="text"
        placeholder="Enter OTP"
        class="w-full p-3 border rounded-lg mb-3">

    <div id="recaptcha-container"></div>

    <button onclick="sendOTP()" class="w-full bg-blue-600 text-white p-3 rounded-lg mb-2">
        Send OTP
    </button>

    <button onclick="verifyOTP()" class="w-full bg-green-600 text-white p-3 rounded-lg">
        Verify OTP
    </button>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
    authDomain: "ff-id-store-dab0f.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let confirmationResult;

// Send OTP
function sendOTP(){

    const phone = document.getElementById('phoneNumber').value.trim();

    if(!/^[0-9]{10}$/.test(phone)){
        alert("10 digit correct number podu");
        return;
    }

    const number = "+91" + phone;

    const appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');

    auth.signInWithPhoneNumber(number, appVerifier)
    .then((result) => {
        confirmationResult = result;
        alert("OTP sent!");
    })
    .catch((error) => {
        alert(error.message);
    });
}

// Verify OTP
function verifyOTP(){

    const code = document.getElementById('otp').value;

    confirmationResult.confirm(code)
    .then((result) => {
        alert("Login Success!");
        localStorage.setItem('user', result.user.phoneNumber);
        window.location.href = "home.html";
    })
    .catch((error) => {
        alert("Wrong OTP");
    });
}

</script>

</body>
</html>
