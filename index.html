    <div id="auth-container" class="glass-card w-full max-w-[400px] rounded-[3rem] shadow-2xl p-10 border-t-4 border-orange-500 text-center">    
        <div class="flex flex-col items-center mb-10">    
            <div class="w-24 h-24 rounded-full border-4 border-white shadow-xl overflow-hidden mb-4 bg-white ring-4 ring-orange-50">    
                <img src="nagai.jpg" alt="Nagai 360" class="w-full h-full object-contain">    
            </div>    
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">NAGAI <span class="text-orange-500">360</span></h1>    
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Premium Reselling</p>    
        </div>    

        <div class="space-y-5">    
            <div class="text-left">    
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Mobile Number</label>    
                <div class="relative flex items-center">    
                    <span class="absolute left-4 text-slate-400 font-bold border-r pr-3">+91</span>    
                    <input type="tel" id="phoneNumber" maxlength="10" placeholder="9876543210" class="w-full pl-16 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all font-semibold">    
                </div>    
            </div>    

            <div class="text-left">    
                <label class="block text-[10px] font-black text-slate-400 uppercase mb-2 ml-1 tracking-widest">Password</label>    
                <div class="relative flex items-center">    
                    <input type="password" id="loginPassword" placeholder="••••••••" class="w-full px-5 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all font-semibold">    
                </div>    
            </div>    
                
            <button id="loginBtn" onclick="handleAuth()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl shadow-xl transition-all active:scale-95 uppercase tracking-widest text-xs mt-4">Login / Sign Up</button>    
            <p id="msg" class="text-[10px] font-bold text-slate-400 mt-2">Enter your number and password to continue.</p>    
        </div>    
    </div>

    // ✅ CHECK STATUS ON PAGE LOAD (User thallivittu vandhaalum check pannum)
    window.onload = function() {
        const phoneMemory = localStorage.getItem('user_phone');
        const isLoggedIn = localStorage.getItem('isLoggedIn');

    function handleAuth() {  
        const phone = document.getElementById('phoneNumber').value.trim();  
        const pass = document.getElementById('loginPassword').value;  
        const btn = document.getElementById('loginBtn');  
        const msg = document.getElementById('msg');  

        if(phone === "9999999999" && pass === "admin123") return window.location.href = "admin.html";  
        if(!/^[0-9]{10}$/.test(phone)) return alert("10 digit number podu bro");  
        if(pass.length < 6) return alert("Password 6 characters venum");

            const userData = snap.val();

            if(!userData) {
                // New User Register
                db.ref('users/' + phone).set({ phone, password: safePass, status: "pending" })
                .then(() => startApprovalListener(phone));
            } else if(userData.password !== safePass) {
                alert("Wrong Password!");
            } else {
                // Existing user, check status
                startApprovalListener(phone);
            }
        });
    }

    // ✅ REAL-TIME LISTENER (Idhu dhaan automatic-ah home pogum)
    function startApprovalListener(phone) {
        localStorage.setItem('user_phone', phone); // Phone memory-la vachuko
        const msg = document.getElementById('msg');
        const btn = document.getElementById('loginBtn');

        db.ref('users/' + phone + '/status').on('value', (snap) => {
            const status = snap.val();
            if(status === "approved") {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'home.html';
            } else {

            }
        });
