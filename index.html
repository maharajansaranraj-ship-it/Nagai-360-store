<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Fast Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass-card w-full max-w-[400px] rounded-[3rem] shadow-2xl p-10 border-t-4 border-orange-500 text-center">
        
        <div class="flex flex-col items-center mb-10">
            <div class="w-24 h-24 rounded-full border-4 border-white shadow-xl overflow-hidden mb-4 bg-white ring-4 ring-orange-50">
                <img src="nagai.jpg" alt="Nagai 360" class="w-full h-full object-contain">
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight">NAGAI <span class="text-orange-500">360</span></h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">Premium Reselling</p>
        </div>

        <div class="space-y-6">
            <div class="group text-left">
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1 tracking-widest">Mobile Number</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-slate-400 font-bold border-r pr-3">+91</span>
                    <input type="tel" id="phoneNumber" placeholder="9876543210" maxlength="10"
                        class="w-full pl-16 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all font-semibold">
                </div>
            </div>
            
            <button id="loginBtn" onclick="fastLogin()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-95 uppercase tracking-widest">
                LOGIN NOW
            </button>
            <p id="statusMsg" class="text-[10px] text-slate-400">By logging in, you agree to our terms.</p>
        </div>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.firebasestorage.app",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // **Auto Redirect Logic**
        // User login-la irundha direct-ah home-ku poyidum
        window.onload = function() {
            if(localStorage.getItem('isLoggedIn') === 'true') {
                window.location.href = 'home.html';
            }
        }

        function fastLogin() {
            const userPhone = document.getElementById('phoneNumber').value;
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('statusMsg');

            if(userPhone.length < 10) {
                alert("Please enter a valid 10-digit number!");
                return;
            }

            btn.innerText = "CHECKING...";
            btn.disabled = true;

            // Database-la user check pannunga
            db.ref('users/' + userPhone).once('value', (snapshot) => {
                // Browser-la user login info save pannikalam
                localStorage.setItem('user_phone', userPhone);
                localStorage.setItem('isLoggedIn', 'true');

                if (!snapshot.exists()) {
                    // Pudhu user-na create pannunga
                    db.ref('users/' + userPhone).set({
                        phone: userPhone,
                        username: "Nagai User",
                        joined: new Date().toLocaleString(),
                        coins: 0
                    }).then(() => {
                        window.location.href = 'home.html';
                    });
                } else {
                    // Already user irundha direct-ah home-ku ponga
                    window.location.href = 'home.html';
                }
            });
        }
    </script>
</body>
</html>
