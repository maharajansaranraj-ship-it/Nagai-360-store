<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nagai 360 | Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100 p-6">

<div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm text-center">

    <!-- LOGO -->
    <div class="flex flex-col items-center mb-5">
        <div class="w-20 h-20 rounded-full overflow-hidden border-4 border-orange-400 shadow">
            <img src="nagai.jpg" class="w-full h-full object-cover">
        </div>
        <h1 class="text-lg font-bold mt-2">Nagai 360</h1>
    </div>

    <!-- Mobile -->
    <input id="phoneNumber" type="tel" maxlength="10"
        placeholder="Mobile Number"
        class="w-full p-3 border rounded-lg mb-3">

    <!-- Password -->
    <input id="password" type="password"
        placeholder="Password"
        class="w-full p-3 border rounded-lg mb-3">

    <button onclick="login()" class="w-full bg-black text-white p-3 rounded-lg">
        Login / Sign Up
    </button>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
    authDomain: "ff-id-store-dab0f.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔥 FIXED LOGIN FLOW (NO ERROR LOGIC)
function login(){

    const phone = document.getElementById('phoneNumber').value.trim();
    const pass = document.getElementById('password').value;

    // validate phone
    if(!/^[0-9]{10}$/.test(phone)){
        alert("10 digit correct number podu");
        return;
    }

    if(pass.length < 4){
        alert("Password min 4 characters");
        return;
    }

    const email = phone + "@nagai.com";

    // 🔥 TRY LOGIN FIRST
    auth.signInWithEmailAndPassword(email, pass)
    .then(()=>{
        localStorage.setItem("user", phone);
        window.location.href = "home.html";
    })
    .catch(error=>{

        // 🔥 IF USER NOT FOUND → CREATE ACCOUNT
        if(error.code === "auth/user-not-found"){

            auth.createUserWithEmailAndPassword(email, pass)
            .then(()=>{
                localStorage.setItem("user", phone);
                window.location.href = "home.html";
            })
            .catch(e=>{
                alert("Create error: " + e.message);
            });

        } else {
            alert("Login error: " + error.message);
        }

    });
}
</script>

</body>
</html>
