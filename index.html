<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Login</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
</head>

<body class="flex items-center justify-center min-h-screen bg-gray-100 p-6">

<div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm text-center">

    <!-- LOGO -->
    <div class="flex flex-col items-center mb-5">
        <div class="w-20 h-20 rounded-full overflow-hidden border-4 border-orange-400 shadow">
            <img src="nagai.jpg" class="w-full h-full object-cover">
        </div>
        <h1 class="text-lg font-bold mt-2">Nagai 360</h1>
    </div>

    <!-- Phone -->
    <input id="phoneNumber" type="tel" maxlength="10"
        placeholder="Mobile Number"
        class="w-full p-3 border rounded-lg mb-3">

    <!-- Password -->
    <input id="password" type="password"
        placeholder="Password"
        class="w-full p-3 border rounded-lg mb-3">

    <button onclick="login()" class="w-full bg-black text-white p-3 rounded-lg">
        Login
    </button>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
    authDomain: "ff-id-store-dab0f.firebaseapp.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// LOGIN FUNCTION
function login(){

    const phone = document.getElementById('phoneNumber').value.trim();
    const pass = document.getElementById('password').value;

    if(!/^[0-9]{10}$/.test(phone)){
        alert("10 digit number podu");
        return;
    }

    if(pass.length < 4){
        alert("Password minimum 4 characters");
        return;
    }

    const email = phone + "@nagai.com";

    auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
        alert("Login Success");
        window.location.href = "home.html";
    })
    .catch(err => {
        if(err.code === "auth/user-not-found"){
            auth.createUserWithEmailAndPassword(email, pass)
            .then(() => {
                alert("Account Created & Login Success");
                window.location.href = "home.html";
            })
            .catch(e => alert(e.message));
        } else {
            alert(err.message);
        }
    });
}
</script>

</body>
</html>
