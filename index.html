<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Secure Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass-card w-full max-w-[400px] rounded-[3rem] shadow-2xl p-10 border-t-4 border-orange-500">
        
        <div class="flex flex-col items-center mb-8 text-center">
            <div class="w-24 h-24 rounded-full border-4 border-white shadow-xl overflow-hidden mb-4 ring-4 ring-orange-50 bg-white">
                <img src="1000871212.jpg" alt="Logo" class="w-full h-full object-contain">
            </div>
            <h1 class="text-2xl font-bold text-slate-800 tracking-tight leading-none">NAGAI <span class="text-orange-500 font-extrabold">360</span></h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-2">Premium Dress Collections</p>
        </div>

        <div id="phone-container" class="space-y-6">
            <div class="group">
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2 ml-1 tracking-widest">Mobile Number</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-slate-400 font-bold border-r pr-3">+91</span>
                    <input type="tel" id="phoneNumber" placeholder="9876543210" 
                        class="w-full pl-16 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all font-semibold text-slate-700 tracking-wider">
                </div>
            </div>
            
            <div id="recaptcha-container" class="mx-auto"></div>
            
            <button onclick="sendOTP()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-95 uppercase tracking-widest">
                SEND OTP
            </button>
        </div>

        <div id="otp-container" class="hidden space-y-6">
            <div class="text-center">
                <p class="text-slate-500 text-sm mb-1">Verify your number</p>
                <p class="text-[10px] text-orange-500 font-bold uppercase tracking-widest">Code sent successfully</p>
            </div>
            <input type="text" id="otpCode" placeholder="6-digit OTP" 
                class="w-full px-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 text-center text-3xl font-extrabold tracking-[0.5em] text-slate-800">
            
            <button onclick="verifyOTP()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-orange-100 transition-all active:scale-95 uppercase tracking-widest">
                VERIFY & EXPLORE
            </button>
            <p class="text-center text-[10px] text-slate-400 uppercase font-bold cursor-pointer" onclick="location.reload()">Change Number</p>
        </div>

    </div>

    <script>
        // --- Working Firebase Config from Your Screenshot ---
        const firebaseConfig = {
            apiKey: "AIzaSyCAiLX0GQN127N1SxCJ86lq...", // Full key-a unga code-la irukura mathiri replace pannikonga
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.appspot.com",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
            measurementId: "G-13KEQBZGJ4"
        };

        // Initialize
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Recaptcha setup
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            'size': 'invisible'
        });

        let confirmationResult;

        // Send OTP Function
        async function sendOTP() {
            const num = document.getElementById('phoneNumber').value;
            if(num.length < 10) { alert("Please enter 10 digits!"); return; }
            
            const phoneNumber = "+91" + num;
            const appVerifier = window.recaptchaVerifier;

            try {
                confirmationResult = await auth.signInWithPhoneNumber(phoneNumber, appVerifier);
                document.getElementById('phone-container').classList.add('hidden');
                document.getElementById('otp-container').classList.remove('hidden');
            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            }
        }

        // Verify & Redirect Function
        async function verifyOTP() {
            const code = document.getElementById('otpCode').value;
            try {
                await confirmationResult.confirm(code);
                // Success! Redirect to your home page
                window.location.href = 'home.html';
            } catch (error) {
                alert("Invalid OTP! Try again.");
            }
        }
    </script>
</body>
</html>
