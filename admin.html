<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f0f2f5; }
        .sidebar-link:hover { background-color: rgba(255, 140, 0, 0.1); color: #ff8c00; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
        <div class="p-6 flex items-center gap-3 border-b border-gray-50">
            <img src="1000871212.jpg" class="w-10 h-10 rounded-full shadow-sm">
            <span class="font-bold text-xl text-blue-900">NAGAI 360</span>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4">
            <a href="#" class="sidebar-link flex items-center gap-3 p-3 rounded-xl text-orange-500 font-bold bg-orange-50 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                Dashboard
            </a>
            <a href="#" class="sidebar-link flex items-center gap-3 p-3 rounded-xl text-slate-500 font-semibold transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                Add Dress
            </a>
            <a href="#" class="sidebar-link flex items-center gap-3 p-3 rounded-xl text-slate-500 font-semibold transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                Orders List
            </a>
        </nav>
        <div class="p-6 border-t border-gray-50">
            <button onclick="window.location.href='login.html'" class="text-sm font-bold text-red-500 flex items-center gap-2">Logout</button>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800">Admin Overview</h1>
                <p class="text-slate-500">Welcome back, Admin! Here is what's happening.</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                    <div class="bg-green-100 p-2 rounded-lg text-green-600 font-bold">₹24,500</div>
                    <span class="text-xs text-slate-400 font-bold uppercase tracking-widest">Today's Sale</span>
                </div>
            </div>
        </header>

        <section class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100 max-w-4xl">
            <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                <span class="w-2 h-8 bg-orange-500 rounded-full"></span>
                Upload New Collection
            </h2>
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Dress Name</label>
                    <input type="text" placeholder="e.g. Blue Silk Saree" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-orange-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Price (INR)</label>
                    <input type="number" placeholder="999" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-orange-500">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Description</label>
                    <textarea rows="3" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:border-orange-500"></textarea>
                </div>
                <div class="col-span-2">
                    <div class="border-2 border-dashed border-slate-200 rounded-[2rem] p-10 flex flex-col items-center justify-center text-slate-400 hover:bg-slate-50 transition-all cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                        <p class="font-bold">Drop dress images here or click to upload</p>
                    </div>
                </div>
            </div>
            <button class="mt-8 bg-blue-900 text-white font-bold py-4 px-10 rounded-2xl shadow-lg hover:shadow-blue-200 active:scale-95 transition-all">
                PUBLISH PRODUCT
            </button>
        </section>
    </main>

</body>
</html>
