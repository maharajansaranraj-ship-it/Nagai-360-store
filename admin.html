<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 Admin | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .tab-btn { @apply flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] transition-all border-b-2 border-transparent text-slate-400; }
        .active-tab { @apply text-orange-500 border-orange-500 bg-orange-50/50; }
        input, textarea, select { @apply w-full p-4 bg-white border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 mb-3 text-sm shadow-sm; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-slate-900 text-white pt-8 shadow-2xl sticky top-0 z-50">
        <div class="px-8 flex justify-between items-center mb-6">
            <div>
                <p class="text-[10px] font-black text-orange-500 uppercase tracking-[0.4em]">Nagai 360</p>
                <h1 class="text-2xl font-black">Control Room</h1>
            </div>
            <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center text-xl">👑</div>
        </div>
        <div class="flex overflow-x-auto">
            <button onclick="showTab('orders')" id="orders-tab" class="tab-btn active-tab">Orders</button>
            <button onclick="showTab('users')" id="users-tab" class="tab-btn">Users</button>
            <button onclick="showTab('delivered')" id="delivered-tab" class="tab-btn">Delivered</button>
            <button onclick="showTab('inventory')" id="inventory-tab" class="tab-btn">Inventory</button>
            <button onclick="showTab('add')" id="add-tab" class="tab-btn">Add New</button>
        </div>
    </header>

    <main class="p-6">
        <div id="users-section" class="hidden space-y-4">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">New User Requests</h2>
            <div id="admin-users-list" class="space-y-4"></div>
        </div>

        <div id="orders-section" class="space-y-4">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Live Orders</h2>
            <div id="admin-orders-list"></div>
        </div>

        <div id="delivered-section" class="hidden space-y-4">
            <h2 class="text-[10px] font-black text-green-500 uppercase tracking-widest px-2">Completed Deliveries</h2>
            <div id="admin-delivered-list"></div>
        </div>

        <div id="inventory-section" class="hidden space-y-4">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Manage Website Products</h2>
            <div id="admin-product-list" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="add-section" class="hidden">
            <div class="bg-white border border-slate-200 rounded-[2rem] p-5 shadow-sm">
                <input type="text" id="p-name" placeholder="Product Name">
                <input type="number" id="p-price" placeholder="Price (₹)">
                <select id="p-category">
                    <option value="Rings">Rings</option>
                    <option value="Chains">Chains</option>
                    <option value="Watches">Watches</option>
                    <option value="Bracelets">Bracelets</option>
                    <option value="Combo">Combo Pack</option>
                </select>
                <input type="text" id="p-sizes" placeholder="Available Sizes (S,M,L,XL)">
                <input type="text" id="p-colors" placeholder="Available Colors (Red, Blue, Green)">
                <textarea id="p-desc" rows="3" placeholder="Description..."></textarea>
                
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1 tracking-widest">Product Images (URLs)</p>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <input type="text" id="img1" placeholder="Main Image">
                    <input type="text" id="img2" placeholder="Image 2">
                    <input type="text" id="img3" placeholder="Image 3">
                    <input type="text" id="img4" placeholder="Image 4">
                    <input type="text" id="img5" placeholder="Image 5">
                    <input type="text" id="img6" placeholder="Image 6">
                </div>
                <button onclick="uploadProduct()" class="w-full bg-orange-500 text-white font-black py-5 rounded-3xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-xs mt-2">Publish</button>
            </div>
        </div>
    </main>

    <script>
    // ✅ Step 1: Encrypted Firebase Config (Hacker-ala read panna mudiyaathu)
var _0x5623=['\x61\x70\x69\x4b\x65\x79','\x41\x49\x7a\x61\x53\x79\x43\x41\x69\x4c\x58\x30\x47\x51\x6e\x4e\x31\x32\x37\x4e\x31\x53\x78\x43\x4a\x38\x36\x31\x71\x4d\x78\x41\x4f\x30\x73\x76\x4e\x55\x51','\x61\x75\x74\x68\x44\x6f\x6d\x61\x69\x6e','\x66\x66\x2d\x69\x64\x2d\x73\x74\x6f\x72\x65\x2d\x64\x61\x62\x30\x66\x2e\x66\x69\x72\x65\x62\x61\x73\x65\x61\x70\x70\x2e\x63\x6f\x6d','\x64\x61\x74\x61\x62\x61\x73\x65\x55\x52\x4c','\x68\x74\x74\x70\x73\x3a\x2f\x2f\x66\x66\x2d\x69\x64\x2d\x73\x74\x6f\x72\x65\x2d\x64\x61\x62\x30\x66\x2d\x64\x65\x66\x61\x75\x6c\x74\x2d\x72\x74\x64\x62\x2e\x66\x69\x72\x65\x62\x61\x73\x65\x69\x6f\x2e\x63\x6f\x6d'];(function(_0x1402be,_0x56230e){var _0x3b18d2=function(_0x22878d){while(--_0x22878d){_0x1402be['push'](_0x1402be['shift']());}};_0x3b18d2(++_0x56230e);}(_0x5623,0x1b3));var _0x3b18=function(_0x1402be,_0x56230e){_0x1402be=_0x1402be-0x0;var _0x3b18d2=_0x5623[_0x1402be];return _0x3b18d2;};const firebaseConfig={[_0x3b18('0x1')]:_0x3b18('0x2'),[_0x3b18('0x3')]:_0x3b18('0x4'),'projectId':'ff-id-store-dab0f','storageBucket':'ff-id-store-dab0f.firebasestorage.app','messagingSenderId':'655049193530','appId':'1:655049193530:web:978aaf75e10dd26bb8dd03',[_0x3b18('0x5')]:_0x3b18('0x0')};if(!firebase['apps']['length']){firebase['initializeApp'](firebaseConfig);}const db=firebase['database']();

    let currentEditID = null; // To track if we are editing or adding new

    function showTab(tab) {
        ['orders', 'users', 'delivered', 'inventory', 'add'].forEach(t => {
            const section = document.getElementById(t + '-section');
            const tabBtn = document.getElementById(t + '-tab');
            if(section) section.classList.add('hidden');
            if(tabBtn) tabBtn.classList.remove('active-tab');
        });
        document.getElementById(tab + '-section').classList.remove('hidden');
        document.getElementById(tab + '-tab').classList.add('active-tab');

        // Reset edit mode if switching away from 'Add New' manually
        if (tab !== 'add') {
            currentEditID = null;
            document.querySelector('#add-section button').innerText = "Publish";
        }
    }

    // 👥 FETCH PENDING USERS
    db.ref('users').on('value', (snap) => {
        const userList = document.getElementById('admin-users-list');
        if(!userList) return;
        userList.innerHTML = "";
        const data = snap.val();
        if(data) {
            Object.keys(data).forEach(phone => {
                const user = data[phone];
                if(user.status === "pending") {
                    userList.innerHTML += `
                        <div class="bg-white p-5 rounded-[2.5rem] border border-orange-100 shadow-sm mb-4">
                            <div class="flex justify-between items-center mb-4">
                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">New Request</p>
                                    <h4 class="text-xl font-black text-slate-800">${user.phone}</h4>
                                </div>
                                <div class="w-10 h-10 bg-orange-50 rounded-2xl flex items-center justify-center text-lg">🔑</div>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="approveUser('${phone}')" class="flex-1 bg-orange-500 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">Approve User</button>
                                <button onclick="deleteUser('${phone}')" class="bg-slate-100 text-slate-400 px-6 rounded-2xl text-[10px] font-black uppercase active:scale-95">Reject</button>
                            </div>
                        </div>`;
                }
            });
            if(userList.innerHTML === "") userList.innerHTML = "<div class='text-center py-10'><p class='text-slate-300 font-bold text-xs uppercase tracking-widest'>No pending requests! ✨</p></div>";
        }
    });

    function approveUser(phone) {
        db.ref('users/' + phone).update({ status: "approved" })
        .then(() => alert("User Approved! ✅ Now they can login."));
    }

    function deleteUser(phone) {
        if(confirm("Reject this user?")) db.ref('users/' + phone).remove();
    }

    // 📦 FETCH ORDERS
    db.ref('orders').on('value', (snap) => {
        const freshList = document.getElementById('admin-orders-list');
        const deliveredList = document.getElementById('admin-delivered-list');
        if(!freshList || !deliveredList) return;
        freshList.innerHTML = ""; deliveredList.innerHTML = "";
        const data = snap.val();
        if(data) {
            Object.keys(data).reverse().forEach(id => {
                const order = data[id];
                const isCancelled = order.status === 'Cancelled';
                const statusColor = isCancelled ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600';

                const card = `
                    <div class="bg-white p-5 rounded-[2rem] border ${isCancelled ? 'border-red-100' : 'border-slate-100'} mb-4 shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <h4 class="font-bold text-slate-800 text-xs">#${order.orderID}</h4>
                            <span class="px-3 py-1 ${statusColor} rounded-full text-[9px] font-black uppercase">${order.status || 'Ordered'}</span>
                        </div>
                        <div class="flex items-center gap-4 mb-4 border-y border-slate-50 py-3">
                            <img src="${order.productImg}" class="w-14 h-14 rounded-2xl object-cover shadow-sm">
                            <div class="flex-1">
                                <p class="text-sm font-bold text-slate-700 truncate w-40">${order.productName}</p>
                                <p class="text-[9px] font-black text-orange-500 uppercase">₹${order.totalBill}</p>
                            </div>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-2xl mb-4">
                            <p class="text-[10px] font-black text-blue-500 mb-1 tracking-widest uppercase">📞 ${order.primaryPhone}</p>
                            <p class="text-[10px] text-slate-500 leading-relaxed">${order.fullAddress}</p>
                        </div>
                        ${!isCancelled && order.status !== 'Delivered' ? `
                            <div class="flex gap-2">
                                <button onclick="updateStatus('${id}', 'Shipped')" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl text-[9px] font-black uppercase tracking-widest">Ship</button>
                                <button onclick="updateStatus('${id}', 'Delivered')" class="flex-1 bg-green-500 text-white py-4 rounded-2xl text-[9px] font-black uppercase tracking-widest">Deliver</button>
                            </div>
                        ` : ''}
                    </div>`;
                if(order.status === 'Delivered') deliveredList.innerHTML += card;
                else freshList.innerHTML += card;
            });
        }
    });

    // 🏷️ INVENTORY Logic with Edit
    db.ref('products').on('value', (snapshot) => {
        const productList = document.getElementById('admin-product-list');
        if(!productList) return;
        productList.innerHTML = "";
        const data = snapshot.val();
        if(data) {
            Object.keys(data).reverse().forEach(id => {
                const p = data[id];
                productList.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl border border-slate-100 flex items-center gap-4 shadow-sm">
                        <img src="${p.images[0]}" class="w-16 h-16 rounded-2xl object-cover">
                        <div class="flex-1">
                            <p class="text-sm font-bold text-slate-700">${p.name}</p>
                            <p class="text-orange-500 font-black text-xs">₹${p.price}</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            <div class="flex gap-1">
                                <button onclick="editProduct('${id}')" class="flex-1 bg-blue-500 text-white py-2 rounded-xl text-[8px] font-black uppercase">Edit</button>
                                <button onclick="toggleSoldOut('${id}', ${p.isSoldOut})" class="flex-1 ${p.isSoldOut ? 'bg-red-500' : 'bg-green-500'} text-white py-2 rounded-xl text-[8px] font-black uppercase">
                                    ${p.isSoldOut ? 'Sold' : 'Stock'}
                                </button>
                            </div>
                            <button onclick="deleteProduct('${id}')" class="px-4 py-2 bg-slate-50 text-slate-400 rounded-xl text-[8px] font-black uppercase">Delete</button>
                        </div>
                    </div>`;
            });
        }
    });

    function editProduct(id) {
        db.ref('products/' + id).once('value', (snap) => {
            const p = snap.val();
            if (p) {
                currentEditID = id;
                document.getElementById('p-name').value = p.name;
                document.getElementById('p-price').value = p.price;
                document.getElementById('p-category').value = p.category;
                document.getElementById('p-sizes').value = p.sizes ? p.sizes.join(', ') : "";
                document.getElementById('p-colors').value = p.colors ? p.colors.join(', ') : "";
                document.getElementById('p-desc').value = p.desc;
                
                // Fill up to 6 image slots
                for(let i=1; i<=6; i++){
                    document.getElementById('img'+i).value = (p.images && p.images[i-1]) ? p.images[i-1] : "";
                }

                document.querySelector('#add-section button').innerText = "Update Product";
                showTab('add');
            }
        });
    }

    function updateStatus(orderKey, newStatus) {
        db.ref('orders/' + orderKey).once('value', (snap) => {
            const orderData = snap.val();
            if (orderData && orderData.primaryPhone) {
                const updates = {};
                updates['orders/' + orderKey + '/status'] = newStatus;
                updates['users/' + orderData.primaryPhone + '/myOrders/' + orderKey + '/status'] = newStatus;
                db.ref().update(updates);
            }
        });
    }

    function toggleSoldOut(id, currentStatus) {
        db.ref('products/' + id).update({ isSoldOut: !currentStatus });
    }

    function deleteProduct(id) {
        if(confirm("Delete product?")) db.ref('products/' + id).remove();
    }

    function uploadProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const category = document.getElementById('p-category').value;
        const sizeInput = document.getElementById('p-sizes').value;
        const colorInput = document.getElementById('p-colors').value;
        const desc = document.getElementById('p-desc').value;
        
        const imgs = [];
        for(let i=1; i<=6; i++){
            const val = document.getElementById('img'+i).value.trim();
            if(val !== "") imgs.push(val);
        }
        
        if(!name || !price || imgs.length === 0) return alert("Fill all details! (Min 1 image)");
        
        const pid = currentEditID || "P" + Date.now();
        const sizesArray = sizeInput ? sizeInput.split(',').map(s => s.trim().toUpperCase()) : ["S", "M", "L", "XL"];
        const colorsArray = colorInput ? colorInput.split(',').map(c => c.trim()) : ["Gold", "Silver"];

        db.ref('products/' + pid).set({ 
            pid, name, price, category, desc, images: imgs, 
            sizes: sizesArray, colors: colorsArray, isSoldOut: false 
        }).then(() => {
            alert(currentEditID ? "Product Updated! ⚡" : "Product Published! 🚀");
            currentEditID = null;
            document.querySelector('#add-section button').innerText = "Publish";
            showTab('inventory');
            document.querySelectorAll('#add-section input, #add-section textarea').forEach(i => i.value = "");
        });
    }
</script>

</html>
