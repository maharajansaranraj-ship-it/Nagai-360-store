<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 Admin | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .glass-card { @apply bg-white border border-slate-200 rounded-[2rem] p-5 shadow-sm mb-4; }
        .tab-btn { @apply flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] transition-all border-b-2 border-transparent text-slate-400; }
        .active-tab { @apply text-orange-500 border-orange-500 bg-orange-50/50; }
        input, textarea { @apply w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 mb-3 text-sm; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-slate-900 text-white pt-8 shadow-2xl sticky top-0 z-50">
        <div class="px-8 flex justify-between items-center mb-6">
            <div>
                <p class="text-[10px] font-black text-orange-500 uppercase tracking-[0.4em]">Nagai 360</p>
                <h1 class="text-2xl font-black">Control Room</h1>
            </div>
            <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center backdrop-blur-md text-xl">👑</div>
        </div>
        
        <div class="flex">
            <button onclick="showTab('orders')" id="orders-tab" class="tab-btn active-tab">Orders</button>
            <button onclick="showTab('inventory')" id="inventory-tab" class="tab-btn">Inventory</button>
            <button onclick="showTab('add')" id="add-tab" class="tab-btn">Add New</button>
        </div>
    </header>

    <main class="p-6">
        <div id="orders-section" class="space-y-4">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Live Orders</h2>
            <div id="admin-orders-list"></div>
        </div>

        <div id="inventory-section" class="hidden space-y-4">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Manage Website Products</h2>
            <div id="admin-product-list" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="add-section" class="hidden">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 px-2">New Listing</h2>
            <div class="glass-card">
                <input type="text" id="p-name" placeholder="Product Name">
                <input type="number" id="p-price" placeholder="Price (₹)">
                <textarea id="p-desc" rows="3" placeholder="Description..."></textarea>
                <p class="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest ml-1">Images (Min 1)</p>
                <input type="text" id="img1" placeholder="Main Image URL">
                <input type="text" id="img2" placeholder="Image URL 2 (Optional)">
                <input type="text" id="img3" placeholder="Image URL 3 (Optional)">
                <button onclick="uploadProduct()" class="w-full bg-orange-500 text-white font-black py-5 rounded-3xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-xs mt-2">
                    Publish to Website
                </button>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.firebasestorage.app",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function showTab(tab) {
            ['orders', 'inventory', 'add'].forEach(t => {
                document.getElementById(t + '-section').classList.add('hidden');
                document.getElementById(t + '-tab').classList.remove('active-tab');
            });
            document.getElementById(tab + '-section').classList.remove('hidden');
            document.getElementById(tab + '-tab').classList.add('active-tab');
        }

        // ✅ FETCH ORDERS
        db.ref('orders').on('value', (snap) => {
            const list = document.getElementById('admin-orders-list');
            list.innerHTML = "";
            if(snap.val()) {
                Object.keys(snap.val()).reverse().forEach(id => {
                    const order = snap.val()[id];
                    list.innerHTML += `
                        <div class="glass-card">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <p class="text-[9px] font-bold text-slate-400">#${order.orderID || 'N/A'}</p>
                                    <h3 class="font-bold text-slate-800">${order.customerName}</h3>
                                </div>
                                <select onchange="updateStatus('${id}', this.value)" class="text-[9px] font-bold bg-orange-50 text-orange-600 p-2 rounded-xl border-none">
                                    <option ${order.status === 'Ordered' ? 'selected' : ''}>Ordered</option>
                                    <option ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                                </select>
                            </div>
                            <div class="flex gap-3 bg-slate-50 p-2 rounded-2xl mb-3">
                                <img src="${order.productImg || 'https://via.placeholder.com/100'}" class="w-12 h-12 object-cover rounded-lg">
                                <p class="text-[10px] text-slate-500 flex-1">${order.fullAddress}</p>
                            </div>
                            <div class="flex justify-between items-center">
                                <span class="font-black text-lg">₹${order.totalBill}</span>
                                <a href="tel:${order.primaryPhone}" class="p-2 bg-slate-900 text-white rounded-xl text-xs px-4 font-bold">Call</a>
                            </div>
                        </div>`;
                });
            } else {
                list.innerHTML = `<div class="text-center py-10 text-slate-400 font-bold text-xs">NO ORDERS YET</div>`;
            }
        });

        // ✅ FETCH PRODUCTS
        db.ref('products').on('value', (snap) => {
            const list = document.getElementById('admin-product-list');
            list.innerHTML = "";
            const data = snap.val();
            if(data) {
                Object.keys(data).forEach(id => {
                    const p = data[id];
                    list.innerHTML += `
                        <div class="glass-card flex gap-4 items-center">
                            <img src="${(p.images && p.images[0]) ? p.images[0] : 'https://via.placeholder.com/100'}" class="w-16 h-16 object-cover rounded-2xl">
                            <div class="flex-1">
                                <h4 class="font-bold text-slate-800 text-sm truncate">${p.name}</h4>
                                <p class="text-orange-500 font-black text-xs">₹${p.price}</p>
                            </div>
                            <div class="flex flex-col gap-2">
                                <button onclick="toggleSoldOut('${id}', ${p.isSoldOut || false})" class="text-[8px] font-bold px-3 py-2 rounded-lg ${p.isSoldOut ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}">
                                    ${p.isSoldOut ? 'SOLD OUT' : 'IN STOCK'}
                                </button>
                                <button onclick="deleteProduct('${id}')" class="text-[8px] font-bold bg-slate-100 text-slate-400 px-3 py-2 rounded-lg">DELETE</button>
                            </div>
                        </div>`;
                });
            }
        });

        function updateStatus(id, s) { db.ref('orders/'+id).update({status: s}); }

        function toggleSoldOut(id, currentStatus) {
            db.ref('products/' + id).update({ isSoldOut: !currentStatus });
        }

        function deleteProduct(id) {
            if(confirm("Confirm Delete?")) { db.ref('products/' + id).remove(); }
        }

        function uploadProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const desc = document.getElementById('p-desc').value;
            
            // Link logic fix - filter out empty inputs
            const imgs = [
                document.getElementById('img1').value,
                document.getElementById('img2').value,
                document.getElementById('img3').value
            ].filter(url => url.trim() !== "");

            if(!name || !price || imgs.length === 0) return alert("Fill Name, Price and at least one image!");

            const pid = "P" + Date.now();
            db.ref('products/' + pid).set({
                pid: pid, 
                name: name, 
                price: price, 
                desc: desc || "Premium Collection",
                images: imgs, 
                isSoldOut: false
            }).then(() => { 
                alert("Published! 🚀"); 
                document.getElementById('p-name').value = "";
                document.getElementById('p-price').value = "";
                document.getElementById('p-desc').value = "";
                document.getElementById('img1').value = "";
                showTab('inventory'); 
            });
        }
    </script>
</body>
</html>
