<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 Admin | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .glass-card { @apply bg-white border border-slate-200 rounded-[2rem] p-5 shadow-sm mb-4; }
        .tab-btn { @apply flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] transition-all border-b-2 border-transparent text-slate-400; }
        .active-tab { @apply text-orange-500 border-orange-500 bg-orange-50/50; }
        input, textarea, select { @apply w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 mb-3 text-sm; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-slate-900 text-white pt-8 shadow-2xl sticky top-0 z-50">
        <div class="px-8 flex justify-between items-center mb-6">
            <div>
                <p class="text-[10px] font-black text-orange-500 uppercase tracking-[0.4em]">Nagai 360</p>
                <h1 class="text-2xl font-black">Control Room</h1>
            </div>
            <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center backdrop-blur-md text-xl">👑</div>
        </div>
        
        <div class="flex">
            <button onclick="showTab('orders')" id="orders-tab" class="tab-btn active-tab">Orders</button>
            <button onclick="showTab('delivered')" id="delivered-tab" class="tab-btn">Delivered</button>
            <button onclick="showTab('inventory')" id="inventory-tab" class="tab-btn">Inventory</button>
            <button onclick="showTab('add')" id="add-tab" class="tab-btn">Add New</button>
        </div>
    </header>

    <main class="p-6">
        <div id="orders-section" class="space-y-4">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Live Orders</h2>
            <div id="admin-orders-list"></div>
        </div>

        <div id="delivered-section" class="hidden space-y-4">
            <h2 class="text-[10px] font-black text-green-500 uppercase tracking-widest px-2">Completed Deliveries</h2>
            <div id="admin-delivered-list"></div>
        </div>

        <div id="inventory-section" class="hidden space-y-4">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Manage Website Products</h2>
            <div id="admin-product-list" class="grid grid-cols-1 gap-4"></div>
        </div>

        <div id="add-section" class="hidden">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6 px-2">New Listing</h2>
            <div class="glass-card">
                <input type="text" id="p-name" placeholder="Product Name">
                <input type="number" id="p-price" placeholder="Price (₹)">
                <select id="p-category">
                    <option value="Rings">Rings</option>
                    <option value="Chains">Chains</option>
                    <option value="Watches">Watches</option>
                    <option value="Bracelets">Bracelets</option>
                    <option value="Combo">Combo Pack</option>
                </select>
                <input type="text" id="p-sizes" placeholder="Available Sizes (e.g., S,M,L,XL)">
                <textarea id="p-desc" rows="3" placeholder="Description..."></textarea>
                <input type="text" id="img1" placeholder="Main Image URL">
                <input type="text" id="img2" placeholder="Image URL 2">
                <input type="text" id="img3" placeholder="Image URL 3">
                <button onclick="uploadProduct()" class="w-full bg-orange-500 text-white font-black py-5 rounded-3xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-xs mt-2">Publish</button>
            </div>
        </div>
    </main>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
        authDomain: "ff-id-store-dab0f.firebaseapp.com",
        projectId: "ff-id-store-dab0f",
        storageBucket: "ff-id-store-dab0f.firebasestorage.app",
        messagingSenderId: "655049193530",
        appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
        databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showTab(tab) {
        ['orders', 'delivered', 'inventory', 'add'].forEach(t => {
            document.getElementById(t + '-section').classList.add('hidden');
            document.getElementById(t + '-tab').classList.remove('active-tab');
        });
        document.getElementById(tab + '-section').classList.remove('hidden');
        document.getElementById(tab + '-tab').classList.add('active-tab');
    }

    // ✅ FETCH ORDERS WITH SIZE AND AMOUNT
    db.ref('orders').on('value', (snap) => {
        const freshList = document.getElementById('admin-orders-list');
        const deliveredList = document.getElementById('admin-delivered-list');
        freshList.innerHTML = "";
        deliveredList.innerHTML = "";
        
        const data = snap.val();
        if(data) {
            Object.keys(data).reverse().forEach(id => {
                const order = data[id];
                const cardHTML = `
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-4">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h4 class="font-bold text-slate-800 text-xs">#${order.orderID}</h4>
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${order.orderDate}</p>
                            </div>
                            <span class="px-3 py-1 ${order.status === 'Delivered' ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'} rounded-full text-[9px] font-black uppercase">${order.status || 'Ordered'}</span>
                        </div>

                        <div class="flex items-center gap-4 mb-4">
                            <img src="${order.productImg || 'https://via.placeholder.com/150'}" class="w-14 h-14 rounded-xl object-cover">
                            <div class="flex-1">
                                <p class="text-sm font-bold text-slate-700">${order.productName}</p>
                                
                                <p class="text-[10px] font-black text-orange-500 uppercase tracking-widest mt-1">
                                    SIZE: ${order.size || order.productSize || 'N/A'}
                                </p>
                                
                                <p class="text-[10px] text-slate-400 mt-1">${order.customerName} | ${order.primaryPhone}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-black text-slate-800 text-base">₹${order.totalBill || '0'}</p>
                                <p class="text-[8px] font-bold text-slate-300 uppercase">${order.paymentMode || 'COD'}</p>
                            </div>
                        </div>

                        <div class="bg-slate-50 p-3 rounded-2xl mb-4 text-[10px] text-slate-500">
                            <p><span class="font-bold text-slate-700">ADDR:</span> ${order.fullAddress}</p>
                        </div>

                        ${order.status !== 'Delivered' ? `
                        <div class="flex gap-2">
                            <button onclick="updateStatus('${id}', 'Shipped')" class="flex-1 bg-blue-500 text-white py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">Mark Shipped</button>
                            <button onclick="updateStatus('${id}', 'Delivered')" class="flex-1 bg-green-500 text-white py-3 rounded-xl text-[10px] font-bold uppercase tracking-widest">Mark Delivered</button>
                        </div>` : ''}
                    </div>`;

                if(order.status === 'Delivered') deliveredList.innerHTML += cardHTML;
                else freshList.innerHTML += cardHTML;
            });
        }
    });

    function updateStatus(key, status) {
        db.ref('orders/' + key).update({ status: status }).then(() => alert("Updated!"));
    }

    function uploadProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const category = document.getElementById('p-category').value;
        const sizeInput = document.getElementById('p-sizes').value;
        const desc = document.getElementById('p-desc').value;
        const imgs = [document.getElementById('img1').value, document.getElementById('img2').value, document.getElementById('img3').value].filter(u => u.trim() !== "");

        if(!name || !price || imgs.length === 0) return alert("Fill Name, Price and Image!");

        const pid = "P" + Date.now();
        const sizesArray = sizeInput ? sizeInput.split(',').map(s => s.trim().toUpperCase()) : ["S", "M", "L", "XL"];

        db.ref('products/' + pid).set({
            pid, name, price, category, desc, images: imgs, sizes: sizesArray, isSoldOut: false
        }).then(() => { 
            alert("Published! 🚀"); 
            showTab('inventory'); 
        });
    }
</script>
</body>
</html>
