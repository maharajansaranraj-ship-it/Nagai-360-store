<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | My Orders</title>

    <script>
        const userPhone = localStorage.getItem('user_phone');
        const isLoggedIn = localStorage.getItem('isLoggedIn');

        if(isLoggedIn !== 'true' || !userPhone) {
            window.location.href = 'index.html'; 
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fdfdfd; }
        .order-card { transition: all 0.3s ease; -webkit-tap-highlight-color: transparent; }
        .order-card:active { transform: scale(0.97); }
    </style>
</head>
<body class="pb-10">

    <header class="p-6 bg-white sticky top-0 z-50 shadow-sm space-y-4">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 bg-slate-100 rounded-full active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
            </button>
            <h1 class="text-xl font-bold text-slate-800">My Orders</h1>
        </div>
    </header>

    <main id="orders-container" class="p-6 space-y-6">
        <div id="loading-spinner" class="flex flex-col items-center justify-center py-20 opacity-50">
            <div class="w-8 h-8 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs font-bold mt-4 tracking-widest text-slate-400">FETCHING YOUR ORDERS...</p>
        </div>
    </main>

    
<script>

    if(!firebase['apps']['length']){firebase['initializeApp'](firebaseConfig);}const db=firebase['database']();

    // ✅ Step 2: REAL-TIME DATA FETCHING
    if(userPhone) {
        // A. Security Check
        db.ref('users/' + userPhone).on('value', (snap) => {
            const userData = snap.val();
            if(!userData || userData.status !== "approved") {
                localStorage.clear();
                window.location.href = 'index.html';
                return;
            }
        });

        // B. Direct Orders Fetch (Fix: Loading myOrders path directly)
        db.ref('users/' + userPhone + '/myOrders').on('value', (snap) => {
            const orders = snap.val();
            loadOrders(orders);
        });
    }

    function loadOrders(orders) {
        const container = document.getElementById('orders-container');
        if(!container) return;
        container.innerHTML = ""; 

        if(!orders || Object.keys(orders).length === 0) {
            container.innerHTML = `<div class="text-center py-20"><p class="text-slate-300 font-bold text-sm">No orders found yet! 🛍️</p></div>`;
            return;
        }

        const orderKeys = Object.keys(orders).reverse();
        
        orderKeys.forEach(id => {
            const order = orders[id];
            const statusClass = getStatusStyle(order.status);
            const pId = order.productID || order.pid || "";
            
            // Cancellation logic (1 day window)
            const orderTime = order.timestamp || 0; 
            const currentTime = Date.now();
            const oneDayMs = 24 * 60 * 60 * 1000;
            const canCancel = (currentTime - orderTime < oneDayMs) && 
                              (order.status !== 'Cancelled' && 
                               order.status !== 'Delivered' && 
                               order.status !== 'Shipped');

            container.innerHTML += `
                <div onclick="if('${pId}' !== ''){ window.location.href='product.html?id=${pId}'; }" 
                     class="bg-white border border-slate-100 rounded-[2rem] p-6 shadow-sm order-card cursor-pointer mb-6">
                    
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Order ID</p>
                            <h3 class="font-black text-slate-800">#${order.orderID || id}</h3>
                        </div>
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider ${statusClass}">${order.status || 'Processing'}</span>
                    </div>
                    
                    <div class="flex items-center gap-4 py-4 border-y border-slate-50">
                        <img src="${order.productImg || 'https://via.placeholder.com/150'}" class="w-16 h-16 object-cover rounded-2xl shadow-inner bg-slate-50">
                        
                        <div class="flex-1">
                            <p class="text-xs font-bold text-slate-600 truncate max-w-[150px]">${order.productName || 'Product Name'}</p>
                            <div class="flex gap-2 mt-1">
                                <p class="text-[9px] text-slate-400 font-bold uppercase">Size: ${order.selectedSize || order.size || 'N/A'}</p>
                                <p class="text-[9px] text-blue-400 font-bold uppercase">Color: ${order.selectedColor || order.color || 'N/A'}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-slate-800">₹${order.totalBill || 0}</p>
                        </div>
                    </div>

                    <div class="mt-4 flex justify-between items-center">
                        <p class="text-[9px] text-slate-400 font-bold uppercase">${order.orderDate || ''}</p>
                        
                        ${canCancel ? `
                            <button onclick="event.stopPropagation(); cancelMyOrder('${id}')" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">
                                Cancel Order
                            </button>
                        ` : ''}

                        ${order.status === 'Cancelled' ? `<p class="text-[9px] text-red-400 font-bold uppercase italic">Cancelled</p>` : ''}
                    </div>
                </div>`;
        });
    }

    function cancelMyOrder(orderKey) {
        if(confirm("Are you sure you want to cancel this order?")) {
            const updates = {};
            updates['users/' + userPhone + '/myOrders/' + orderKey + '/status'] = 'Cancelled';
            updates['orders/' + orderKey + '/status'] = 'Cancelled';

            db.ref().update(updates).then(() => {
                alert("Order Cancelled! 🛑");
            }).catch(err => alert("Error: " + err.message));
        }
    }

    function getStatusStyle(status) {
        switch(status?.toLowerCase()) {
            case 'delivered': return 'bg-green-100 text-green-600';
            case 'cancelled': return 'bg-red-100 text-red-600';
            case 'shipped': return 'bg-blue-100 text-blue-600';
            case 'order placed': return 'bg-orange-100 text-orange-600';
            default: return 'bg-slate-100 text-slate-600';
        }
    }
</script>

</body>
</html>
