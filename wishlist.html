        </button>
        <h1 class="text-xl font-bold text-slate-800">My Wishlist</h1>
    </header>

    <main id="wishlist-container" class="p-6 grid grid-cols-2 gap-4">
        <p id="loading-msg" class="col-span-2 text-center text-slate-400 mt-10 font-bold text-xs tracking-widest uppercase">Loading your favorites...</p>
    </main>

// ✅ 3. REAL-TIME LISTENER (Status & Wishlist)
function initWishlist() {
    if (!userPhone) return;

    // users/userPhone node-ai watch pannuthu
    db.ref('users/' + userPhone).on('value', (snap) => {
        const data = snap.val();

        if (!data) {
            console.error("User data not found in DB");
            return;
        }

        // Account approval check
        if (data.status !== "approved") {
            localStorage.clear();
            window.location.href = 'index.html';
            return;
        }

        // Wishlist data-vai render pannu
        renderWishlist(data.wishlist);
    }, (error) => {
        console.error("Firebase Read Error:", error);
        if(error.message.includes("permission_denied")) {
            alert("Permission error! Rules-ai check pannunga.");
        }
    });
}

// ✅ 4. RENDER UI
function renderWishlist(wishlistData) {
    const container = document.getElementById('wishlist-container');
    const loadingMsg = document.getElementById('loading-msg');
    
    if (loadingMsg) loadingMsg.style.display = 'none';
    container.innerHTML = "";

    if (wishlistData && Object.keys(wishlistData).length > 0) {
        Object.keys(wishlistData).reverse().forEach(id => {
            const item = wishlistData[id];
            const displayImg = item.image || item.img || "https://via.placeholder.com/150";

            container.innerHTML += `
                <div onclick="window.location.href='product.html?id=${id}'" class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 wish-card cursor-pointer relative">
                    <img src="${displayImg}" class="w-full h-44 object-cover" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="p-4">
                        <h3 class="text-[11px] font-bold text-slate-700 truncate">${item.name || 'Product'}</h3>
                        <p class="text-orange-500 font-black text-sm mt-1">₹${item.price || '0'}</p>
                        
                        <button onclick="event.stopPropagation(); removeFromWishlist('${id}')" 
                                class="w-full mt-3 py-2 bg-red-50 text-red-500 rounded-xl text-[9px] font-black uppercase tracking-widest active:bg-red-100 transition-all">
                            Remove
                        </button>
                    </div>
                </div>
            `;
        });
    } else {
        container.innerHTML = `
            <div class="col-span-2 text-center py-20">
                <div class="text-4xl mb-4">🤍</div>
                <p class='text-slate-400 font-bold text-sm'>Your wishlist is empty!</p>
                <button onclick="window.location.href='home.html'" class="mt-4 text-orange-500 font-black text-[10px] uppercase tracking-widest">Start Shopping</button>
            </div>`;
    }
}

// ✅ 5. REMOVE FUNCTION
function removeFromWishlist(id) {
    if (confirm("Remove from wishlist?")) {
        // Path matches: users/userPhone/wishlist/productId
        db.ref('users/' + userPhone + '/wishlist/' + id).remove()
            .then(() => {
                console.log("Item removed from Firebase");
            })
            .catch(err => alert("Error: " + err.message));
    }
}

// Start the process
