<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | My Wishlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#fcfcfc] pb-24">

    <header class="p-6 flex items-center gap-4 bg-white sticky top-0 z-50 shadow-sm">
        <button onclick="window.location.href='home.html'" class="p-2 bg-slate-100 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <h1 class="text-xl font-bold text-slate-800">My Wishlist</h1>
    </header>

    <main id="wishlist-container" class="p-6 grid grid-cols-2 gap-4">
        <p id="loading-msg" class="col-span-2 text-center text-slate-400 mt-10">Loading your favorites...</p>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.firebasestorage.app",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userPhone = localStorage.getItem('user_phone');

        if(userPhone) {
            db.ref('users/' + userPhone + '/wishlist').on('value', (snapshot) => {
                const container = document.getElementById('wishlist-container');
                container.innerHTML = ""; // Clear message
                const data = snapshot.val();

                if(data) {
                    Object.keys(data).forEach(id => {
                        const item = data[id];
                        container.innerHTML += `
                            <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-50 relative">
                                <img src="${item.image}" class="w-full h-48 object-cover">
                                <div class="p-4">
                                    <h3 class="text-xs font-bold text-slate-800 truncate">${item.name}</h3>
                                    <p class="text-orange-500 font-extrabold text-sm mt-1">₹${item.price}</p>
                                    <button onclick="removeFromWishlist('${id}')" class="text-[10px] text-red-500 font-bold mt-2 uppercase">Remove</button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = "<p class='col-span-2 text-center text-slate-400 mt-10'>Your wishlist is empty!</p>";
                }
            });
        }

        function removeFromWishlist(id) {
            db.ref('users/' + userPhone + '/wishlist/' + id).remove();
        }
    </script>
</body>
</html>
