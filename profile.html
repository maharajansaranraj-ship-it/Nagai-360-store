<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Profile</title>

    <script>
        const userPhone = localStorage.getItem('user_phone');
        const isLoggedIn = localStorage.getItem('isLoggedIn');

        if(isLoggedIn !== 'true' || !userPhone) {
            window.location.href = 'index.html'; 
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfc; }
        .profile-card { background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); }
        #edit-modal { backdrop-filter: blur(8px); transition: all 0.3s ease; }
    </style>
</head>
<body class="pb-24">

    <div id="edit-modal" class="fixed inset-0 bg-black/60 z-[200] hidden flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl scale-95 transition-transform duration-300">
            <h3 class="text-xl font-bold text-slate-800 mb-6">Edit Profile</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Your Name</label>
                    <input type="text" id="edit-name-input" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 font-bold text-slate-700 mt-2">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Phone Number (Fixed)</label>
                    <input type="text" id="edit-phone-fixed" disabled class="w-full p-4 bg-slate-100 border border-slate-200 rounded-2xl text-slate-400 font-bold mt-2 cursor-not-allowed">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeEditModal()" class="flex-1 py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl active:scale-95 transition-all">Cancel</button>
                    <button onclick="saveProfile()" class="flex-1 py-4 bg-orange-500 text-white font-bold rounded-2xl shadow-lg active:scale-95 transition-all">Save</button>
                </div>
            </div>
        </div>
    </div>

    <section class="profile-card p-8 pb-12 rounded-b-[3rem] shadow-2xl relative">
        <div class="flex justify-between items-center mb-8">
            <button onclick="window.location.href='home.html'" class="p-2 bg-white/10 rounded-full backdrop-blur-md text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
            </button>
            <h1 class="text-white font-bold text-lg uppercase tracking-widest">My Account</h1>
            <button onclick="logout()" class="p-2 bg-red-500/20 rounded-full text-red-400 border border-red-500/30 active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>

        <div class="flex flex-col items-center">
            <div class="relative">
                <img id="profile-img" src="https://ui-avatars.com/api/?name=User&background=f97316&color=fff" class="w-24 h-24 rounded-full border-4 border-white/20 shadow-xl object-cover">
                <button onclick="openEditModal()" class="absolute bottom-0 right-0 bg-orange-500 p-2 rounded-full border-2 border-slate-900 shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                </button>
            </div>
            <h2 id="display-name" class="text-white text-xl font-bold mt-4">Nagai User</h2>
            <p id="display-phone" class="text-slate-400 text-sm font-medium tracking-wider">+91 0000000000</p>
        </div>

        <div class="absolute -bottom-10 left-8 right-8 bg-white rounded-3xl shadow-xl flex justify-around p-6 border border-slate-50">
            <div class="text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Coins</p>
                <p id="profile-coins" class="text-lg font-black text-orange-500">0</p>
            </div>
            <div class="w-px bg-slate-100 h-8"></div>
            <div class="text-center" onclick="window.location.href='wishlist.html'">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Wishlist</p>
                <p id="wishlist-count" class="text-lg font-black text-slate-800">0</p>
            </div>
            <div class="w-px bg-slate-100 h-8"></div>
            <div class="text-center" onclick="window.location.href='my-orders.html'">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Orders</p>
                <p id="orders-count" class="text-lg font-black text-slate-800">0</p>
            </div>
        </div>
    </section>

    <section class="mt-20 px-8 space-y-4">
        <h3 class="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-1">Account Settings</h3>
        
        <div onclick="window.location.href='my-orders.html'" class="flex items-center gap-4 p-5 bg-white rounded-2xl border border-slate-50 shadow-sm active:scale-95 transition-all cursor-pointer">
            <div class="w-10 h-10 bg-blue-50 rounded-xl flex items-center justify-center text-blue-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
            </div>
            <p class="flex-1 font-bold text-slate-700">My Orders</p>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" /></svg>
        </div>

        <div onclick="window.location.href='wishlist.html'" class="flex items-center gap-4 p-5 bg-white rounded-2xl border border-slate-50 shadow-sm active:scale-95 transition-all cursor-pointer">
            <div class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
            </div>
            <p class="flex-1 font-bold text-slate-700">My Wishlist</p>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" /></svg>
        </div>

        <div onclick="window.location.href='https://wa.me/91XXXXXXXXXX'" class="flex items-center gap-4 p-5 bg-white rounded-2xl border border-slate-50 shadow-sm active:scale-95 transition-all cursor-pointer">
            <div class="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center text-green-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z" /></svg>
            </div>
            <p class="flex-1 font-bold text-slate-700">Customer Support</p>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" /></svg>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-slate-100 px-8 py-5 flex justify-between items-center shadow-lg">
        <button onclick="window.location.href='home.html'" class="text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </button>
        <button onclick="window.location.href='wishlist.html'" class="text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
        </button>
        <button onclick="window.location.href='cart.html'" class="text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
        </button>
        <button onclick="window.location.href='profile.html'" class="text-orange-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        </button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ✅ 2. REAL-TIME ACCOUNT & SAFETY CHECK
        if(userPhone) {
            db.ref('users/' + userPhone).on('value', (snap) => {
                const data = snap.val();
                
                // Account Rejected or Deleted check
                if(!data || data.status !== "approved") {
                    localStorage.clear();
                    window.location.href = 'index.html';
                    return;
                }

                // Update UI details
                document.getElementById('display-name').innerText = data.username || "Nagai User";
                document.getElementById('display-phone').innerText = "+91 " + userPhone;
                document.getElementById('profile-coins').innerText = data.coins || 0;
                
                const avatarName = data.username || "User";
                document.getElementById('profile-img').src = `https://ui-avatars.com/api/?name=${avatarName}&background=f97316&color=fff`;

                if(data.wishlist) document.getElementById('wishlist-count').innerText = Object.keys(data.wishlist).length;
                if(data.myOrders) document.getElementById('orders-count').innerText = Object.keys(data.myOrders).length;
            });
        }

        function openEditModal() {
            document.getElementById('edit-name-input').value = document.getElementById('display-name').innerText;
            document.getElementById('edit-phone-fixed').value = "+91 " + userPhone;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }

        function saveProfile() {
            const newName = document.getElementById('edit-name-input').value.trim();
            if(newName === "") return alert("Please enter a name!");
            
            db.ref('users/' + userPhone).update({ username: newName }).then(() => {
                closeEditModal();
            });
        }

        function logout() {
            if(confirm("Are you sure you want to logout?")) {
                localStorage.clear(); // ✅ Clearing all memory
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
