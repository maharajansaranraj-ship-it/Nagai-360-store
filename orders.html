<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Profile & Orders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .tab-active { color: #ff8c00; border-bottom: 3px solid #ff8c00; }
    </style>
</head>
<body class="pb-24">

    <div class="bg-white px-6 pt-12 pb-8 rounded-b-[3rem] shadow-sm border-b border-slate-100">
        <div class="flex items-center gap-5">
            <div class="relative">
                <div class="w-20 h-20 rounded-full border-4 border-orange-50 overflow-hidden shadow-md">
                    <img src="https://ui-avatars.com/api/?name=User&background=ff8c00&color=fff" class="w-full h-full object-cover">
                </div>
                <button class="absolute bottom-0 right-0 bg-blue-900 text-white p-1.5 rounded-full border-2 border-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                </button>
            </div>
            <div>
                <h2 class="text-xl font-bold text-slate-800">Nagai 360 User</h2>
                <p class="text-sm text-slate-400 font-medium">+91 98765 43210</p>
                <button onclick="window.location.href='login.html'" class="text-xs font-bold text-red-500 mt-2 uppercase tracking-wider">Logout</button>
            </div>
        </div>
    </div>

    <div class="flex bg-white mt-2 px-6 border-b border-slate-100">
        <button class="flex-1 py-4 text-sm font-bold tab-active uppercase tracking-widest">My Orders</button>
        <button class="flex-1 py-4 text-sm font-bold text-slate-400 uppercase tracking-widest">Settings</button>
    </div>

    <main class="p-6 space-y-5">
        
        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50 relative overflow-hidden">
            <div class="absolute top-0 right-0 bg-orange-100 text-orange-600 px-4 py-1 rounded-bl-2xl text-[10px] font-bold uppercase tracking-widest">
                In Transit
            </div>
            <div class="flex gap-4">
                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1000" class="w-20 h-24 object-cover rounded-2xl shadow-sm">
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800 text-sm">Summer Floral Dress</h3>
                    <p class="text-[10px] text-slate-400 mt-1">Order ID: #NG360-8892</p>
                    <div class="mt-3 flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <p class="text-xs font-bold text-slate-600">Arriving by Thursday</p>
                    </div>
                </div>
            </div>
            <div class="mt-4 pt-4 border-t border-slate-50 flex justify-between items-center">
                <button class="text-xs font-bold text-blue-900 bg-blue-50 px-4 py-2 rounded-xl transition-all active:scale-95">TRACK ORDER</button>
                <span class="font-bold text-slate-800">₹899</span>
            </div>
        </div>

        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-50 opacity-80">
            <div class="flex gap-4">
                <img src="https://images.unsplash.com/photo-1539109132314-347f08503241?q=80&w=1000" class="w-20 h-24 object-cover rounded-2xl grayscale-[50%]">
                <div class="flex-1">
                    <h3 class="font-bold text-slate-800 text-sm">Casual Denim Jacket</h3>
                    <p class="text-[10px] text-slate-400 mt-1 italic">Delivered on 12 April 2026</p>
                    <button class="mt-3 text-[10px] font-bold text-orange-500 flex items-center gap-1 uppercase tracking-wider">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                        Buy Again
                    </button>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-10 py-4 flex justify-between items-center shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <button onclick="window.location.href='home.html'" class="text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
        </button>
        <button class="text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
        </button>
        <button class="text-orange-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        </button>
    </nav>

</body>
</html>
