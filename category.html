<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Category</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 pb-10">

    <div class="bg-white sticky top-0 z-50 shadow-sm">
        <header class="p-5 flex items-center gap-4">
            <button onclick="history.back()" class="p-2 bg-slate-100 rounded-full active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-800" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
            </button>
            <h1 id="category-title" class="text-lg font-bold text-slate-800 capitalize">Category</h1>
        </header>

        <div class="px-5 pb-4">
            <div onclick="location.href='search.html'" class="flex items-center gap-3 bg-slate-100 p-4 rounded-[1.5rem] border border-slate-200 active:scale-[0.98] transition-all cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <span class="text-slate-400 text-sm font-medium">Search for more products...</span>
            </div>
        </div>
    </div>

    <div class="px-5 mt-6">
        <div id="category-grid" class="grid grid-cols-2 gap-4">
            <p id="loading-msg" class="col-span-2 text-center py-20 text-slate-400 animate-pulse font-medium">Connecting to Nagai 360...</p>
        </div>
    </div>

    <script>
        // ✅ Direct Config for Nagai 360
        const firebaseConfig = {
            apiKey: "AIzaSyCAiLX0GQnN127N1SxCj861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.firebasestorage.app",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const catName = urlParams.get('cat'); 

        if(catName) {
            document.getElementById('category-title').innerText = catName + " Collection";
            loadCategoryItems(catName);
        } else {
            document.getElementById('loading-msg').innerText = "Please select a category from Home.";
        }

        function loadCategoryItems(cat) {
            const grid = document.getElementById('category-grid');
            console.log("Starting search for:", cat);

            // Fetching ALL products and filtering locally
            db.ref('products').once('value', (snap) => {
                const data = snap.val();
                console.log("Raw data from Firebase:", data);

                grid.innerHTML = ""; // Clear loader
                let found = false;

                if(data) {
                    Object.keys(data).forEach(id => {
                        const p = data[id];
                        const productName = p.name ? p.name.toLowerCase() : "";
                        const searchKey = cat.toLowerCase();

                        // Logic: Does the name contain the category word?
                        if (productName.includes(searchKey)) {
                            found = true;
                            // Check for image, fallback to placeholder if missing
                            const imgUrl = (p.images && p.images[0]) ? p.images[0] : 'https://via.placeholder.com/150';
                            
                            grid.innerHTML += `
                                <div onclick="location.href='product.html?id=${id}'" class="bg-white rounded-[2rem] p-3 shadow-sm border border-slate-100 active:scale-95 transition-all">
                                    <div class="w-full h-44 overflow-hidden rounded-[1.5rem] mb-3 bg-slate-100">
                                        <img src="${imgUrl}" class="w-full h-full object-cover">
                                    </div>
                                    <div class="px-2 pb-1">
                                        <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest leading-none">Nagai 360</p>
                                        <h3 class="font-bold text-slate-800 text-xs truncate mt-1">${p.name}</h3>
                                        <p class="text-orange-500 font-black text-sm mt-1">₹${p.price}</p>
                                    </div>
                                </div>`;
                        }
                    });
                }

                if(!found) {
                    grid.innerHTML = `
                        <div class='col-span-2 text-center py-20'>
                            <p class='text-slate-400'>No products found for "${cat}".</p>
                            <p class='text-[10px] text-slate-300 mt-2'>Check if product name has "${cat}" in it.</p>
                        </div>`;
                }
            }, (error) => {
                console.error("Firebase Error:", error);
                grid.innerHTML = "<p class='col-span-2 text-center text-red-400'>Connection Error! Check Internet.</p>";
            });
        }
    </script>
</body>
</html>
