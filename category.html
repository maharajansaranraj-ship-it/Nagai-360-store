<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Category</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50 pb-10">

    <header class="p-5 flex items-center gap-4 bg-white sticky top-0 z-50 shadow-sm">
        <button onclick="history.back()" class="p-2 bg-slate-100 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <h1 id="category-title" class="text-lg font-bold text-slate-800 capitalize">Category</h1>
    </header>

    <div class="px-5 mt-6">
        <div id="category-grid" class="grid grid-cols-2 gap-4">
            <p id="loading-msg" class="col-span-2 text-center py-10 text-slate-400 animate-pulse">Searching for items...</p>
        </div>
    </div>

    <script>
        // Use your same Firebase Config here
        const firebaseConfig = { /* ... paste your config ... */ };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const catName = urlParams.get('cat'); // e.g., 'saree'
        
        if(catName) {
            document.getElementById('category-title').innerText = catName + " Collection";
            loadCategoryItems(catName);
        }

        function loadCategoryItems(cat) {
    const grid = document.getElementById('category-grid');
    console.log("Filtering for category:", cat); // Check browser console

    // Query start
    db.ref('products').orderByChild('category').equalTo(cat).once('value', (snap) => {
        grid.innerHTML = "";
        const data = snap.val();
        
        console.log("Data received:", data); // Check if data is coming

        if(data) {
            Object.keys(data).forEach(id => {
                const p = data[id];
                grid.innerHTML += `
                    <div onclick="location.href='product.html?id=${id}'" class="bg-white rounded-[2rem] p-3 shadow-sm border border-slate-100">
                        <img src="${p.images[0]}" class="w-full h-44 object-cover rounded-[1.5rem] mb-3">
                        <div class="px-1">
                            <h3 class="font-bold text-slate-800 text-xs truncate">${p.name}</h3>
                            <p class="text-orange-500 font-black text-sm mt-1">₹${p.price}</p>
                        </div>
                    </div>`;
            });
        } else {
            // If No match, try with first letter Capital (Saree instead of saree)
            let capCat = cat.charAt(0).toUpperCase() + cat.slice(1);
            if(cat !== capCat) {
                console.log("Trying with Capitalized category:", capCat);
                loadCategoryItems(capCat); 
            } else {
                grid.innerHTML = "<p class='col-span-2 text-center py-20 text-slate-400'>No items found. Check Database Category name.</p>";
            }
        }
    }, (error) => {
        console.error("Firebase Error:", error);
        grid.innerHTML = "<p class='col-span-2 text-center text-red-500'>Error loading data!</p>";
    });
}

    </script>
</body>
</html>
