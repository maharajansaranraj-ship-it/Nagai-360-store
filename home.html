<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Discover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfc; }
        .masonry { columns: 2; column-gap: 16px; padding: 16px; }
        .masonry-item { break-inside: avoid; margin-bottom: 16px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-heart { fill: #ef4444; stroke: #ef4444; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">NAGAI <span class="text-orange-500">360</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="bg-orange-50 px-3 py-1 rounded-full flex items-center gap-1 border border-orange-100">
                <span class="text-sm">🪙</span>
                <span id="user-coins" class="text-orange-600 font-bold text-sm">0</span>
            </div>
            <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=334155&color=fff" 
                 onclick="window.location.href='profile.html'" 
                 class="w-10 h-10 rounded-full border-2 border-white shadow-sm cursor-pointer">
        </div>
    </header>

    <section class="px-6 py-4">
        <div onclick="window.location.href='search.html'" class="relative cursor-pointer group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 group-hover:text-orange-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <div class="w-full p-4 pl-12 bg-slate-100 rounded-[1.5rem] text-slate-500 text-sm font-medium border border-transparent group-hover:border-orange-200 transition-all">
                Search latest collections...
            </div>
        </div>
    </section>

    <div class="flex gap-3 overflow-x-auto px-6 py-2 no-scrollbar">
        <button class="px-6 py-2 bg-slate-900 text-white rounded-full text-xs font-bold shadow-lg shadow-slate-200">All</button>
        <button class="px-6 py-2 bg-white border border-slate-100 rounded-full text-xs font-bold text-slate-500 shadow-sm">Saree</button>
        <button class="px-6 py-2 bg-white border border-slate-100 rounded-full text-xs font-bold text-slate-500 shadow-sm">Chudidhar</button>
        <button class="px-6 py-2 bg-white border border-slate-100 rounded-full text-xs font-bold text-slate-500 shadow-sm">Western</button>
    </div>

    <main class="masonry">
        
        <div class="masonry-item bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-50 relative group">
            <button onclick="toggleWishlist(event, 'p1', 'Floral Summer', 'img1.jpg', 899)" class="absolute top-3 right-3 z-10 p-2 bg-white/90 backdrop-blur rounded-full shadow-md active:scale-125 transition-all">
                <svg id="heart-p1" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
            </button>
            <div onclick="window.location.href='product.html?id=p1'">
                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1000" class="w-full object-cover">
                <div class="p-4">
                    <h3 class="text-[11px] font-bold text-slate-700 truncate">Floral Summer</h3>
                    <p class="text-orange-500 font-extrabold text-sm mt-1">₹899</p>
                </div>
            </div>
        </div>

        <div class="masonry-item bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-50 relative group">
            <button onclick="toggleWishlist(event, 'p2', 'Modern Saree', 'img2.jpg', 1499)" class="absolute top-3 right-3 z-10 p-2 bg-white/90 backdrop-blur rounded-full shadow-md active:scale-125 transition-all">
                <svg id="heart-p2" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                </svg>
            </button>
            <div onclick="window.location.href='product.html?id=p2'">
                <img src="https://images.unsplash.com/photo-1581044777550-4cfa60707c03?q=80&w=1000" class="w-full object-cover">
                <div class="p-4">
                    <h3 class="text-[11px] font-bold text-slate-700 truncate">Modern Silk Saree</h3>
                    <p class="text-orange-500 font-extrabold text-sm mt-1">₹1,499</p>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-slate-100 px-8 py-5 flex justify-between items-center shadow-[0_-15px_40px_rgba(0,0,0,0.03)] z-[100]">
        <button onclick="window.location.href='home.html'" class="text-orange-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </button>
        <button onclick="window.location.href='wishlist.html'" class="text-slate-300 hover:text-orange-400 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
        </button>
        <button onclick="window.location.href='cart.html'" class="text-slate-300 hover:text-orange-400 transition-colors relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
            <span class="absolute -top-2 -right-2 bg-orange-500 text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center">2</span>
        </button>
        <button onclick="window.location.href='profile.html'" class="text-slate-300 hover:text-orange-400 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        </button>
    </nav>

    <script>
        // ✅ Real Firebase Config (Same as Login)
        const firebaseConfig = {
            apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.firebasestorage.app",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userPhone = localStorage.getItem('user_phone');

        // ✅ 1. Auto-Redirect if Not Logged In
        if(!userPhone) { window.location.href = 'index.html'; }

        // ✅ 2. Fetch Coins & Profile Data
        db.ref('users/' + userPhone).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('user-coins').innerText = data.coins || 0;
            }
        });

        // ✅ 3. Wishlist Toggle Logic
        function toggleWishlist(event, id, name, img, price) {
            event.stopPropagation(); // Card redirect-a stop panna
            const heartIcon = document.getElementById('heart-' + id);
            
            // Firebase-la save pannum
            db.ref('users/' + userPhone + '/wishlist/' + id).set({
                name: name,
                image: img,
                price: price
            }).then(() => {
                heartIcon.classList.add('active-heart');
                alert("Added to Wishlist! ❤️");
            });
        }
    </script>
</body>
</html>
