<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Discover</title>
    
    <script>
        const userPhone = localStorage.getItem('user_phone');
        const isLoggedIn = localStorage.getItem('isLoggedIn');

        if(isLoggedIn !== 'true' || !userPhone) {
            window.location.href = 'index.html'; 
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfc; }
        .masonry { columns: 2; column-gap: 16px; padding: 16px; }
        .masonry-item { break-inside: avoid; margin-bottom: 16px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .masonry-item:active { transform: scale(0.92); opacity: 0.8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-heart { fill: #ef4444 !important; stroke: #ef4444 !important; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <img src="nagai.jpg" alt="Logo" class="w-10 h-10 rounded-xl object-cover shadow-sm border border-slate-100" onerror="this.src='https://ui-avatars.com/api/?name=N&background=f97316&color=fff'">
            <div>
                <h1 class="text-xl font-extrabold text-slate-800 tracking-tight leading-tight">
                    NAGAI <span class="text-orange-500">360</span>
                </h1>
                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-[0.2em] -mt-1">Premium Collections</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="bg-orange-50 px-3 py-1 rounded-full flex items-center gap-1 border border-orange-100">
                <span class="text-sm">🪙</span>
                <span id="user-coins" class="text-orange-600 font-bold text-sm">0</span>
            </div>
            <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=334155&color=fff" 
                 onclick="window.location.href='profile.html'" 
                 class="w-10 h-10 rounded-full border-2 border-white shadow-sm cursor-pointer">
        </div>
    </header>

    <section class="px-6 py-4">
        <div onclick="window.location.href='search.html'" class="relative cursor-pointer group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 group-hover:text-orange-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            <div class="w-full p-4 pl-12 bg-slate-100 rounded-[1.5rem] text-slate-500 text-sm font-medium border border-transparent group-hover:border-orange-200 transition-all">
                Search latest collections...
            </div>
        </div>
    </section>

    <div class="flex gap-3 overflow-x-auto px-6 py-2 no-scrollbar" id="category-bar">
        <button onclick="filterCategory('All')" id="btn-All" class="cat-btn px-6 py-2 bg-slate-900 text-white rounded-full text-xs font-bold shadow-lg whitespace-nowrap">All</button>
        <button onclick="filterCategory('Saree')" id="btn-Saree" class="cat-btn px-6 py-2 bg-white border border-slate-100 rounded-full text-xs font-bold text-slate-500 shadow-sm whitespace-nowrap">Saree</button>
        <button onclick="filterCategory('Pants')" id="btn-Pants" class="cat-btn px-6 py-2 bg-white border border-slate-100 rounded-full text-xs font-bold text-slate-500 shadow-sm whitespace-nowrap">Pants</button>
        <button onclick="filterCategory('Men')" id="btn-Men" class="cat-btn px-6 py-2 bg-white border border-slate-100 rounded-full text-xs font-bold text-slate-500 shadow-sm whitespace-nowrap">Men</button>
    </div>

    <main class="masonry" id="main-product-grid"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-slate-100 px-8 py-5 flex justify-between items-center shadow-md z-[100]">
        <button onclick="window.location.href='home.html'" class="text-orange-500">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </button>
        <button onclick="window.location.href='wishlist.html'" class="text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
        </button>
        <button onclick="window.location.href='cart.html'" class="text-slate-300 relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-orange-500 text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span>
        </button>
        <button onclick="window.location.href='profile.html'" class="text-slate-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        </button>
    </nav>

    <script>

    const SEC = "nagai_secure_v1";

    let allProducts = {}; 
    let currentFilter = 'All';

    // ✅ REAL-TIME ACCOUNT CHECK
    if(userPhone) {
        db.ref(SEC + '/users/' + userPhone).on('value', (snap) => {
            const data = snap.val();
            if(!data || data.status !== "approved") {
                localStorage.clear();
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('user-coins').innerText = data.coins || 0;
            const cartCount = data.cart ? Object.keys(data.cart).length : 0;
            document.getElementById('cart-count').innerText = cartCount;
            if(data.profileImg) document.getElementById('user-avatar').src = data.profileImg;
        });
    }

    // Fetch Products from Secret Folder
    db.ref(SEC + '/products').on('value', (snapshot) => {
        allProducts = snapshot.val();
        renderProducts();
    });

    function renderProducts() {
        const grid = document.getElementById('main-product-grid');
        grid.innerHTML = "";
        if(!allProducts) return;

        Object.keys(allProducts).reverse().forEach(key => {
            const p = allProducts[key];
            const pCategory = p.category ? p.category.toLowerCase() : "";
            if (currentFilter !== 'All' && pCategory !== currentFilter.toLowerCase()) return;

            const soldOutUI = p.isSoldOut ? `
                <div class="absolute top-3 left-3 bg-red-600 text-white text-[8px] font-black px-2 py-1 rounded-lg z-10">SOLD OUT</div>
                <div class="absolute inset-0 bg-white/40 z-0 backdrop-grayscale-[0.5]"></div>
            ` : '';

            grid.innerHTML += `
                <div class="masonry-item bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-50 relative">
                    ${soldOutUI}
                    <button onclick="toggleWishlist(event, '${p.pid}', '${p.name}', '${p.images[0]}', ${p.price})" class="absolute top-3 right-3 z-20 p-2 bg-white/90 rounded-full shadow-md">
                        <svg id="heart-${p.pid}" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                        </svg>
                    </button>
                    <div onclick="${p.isSoldOut ? "alert('Out of stock!')" : `window.location.href='product.html?id=${p.pid}'`}">
                        <img src="${p.images[0]}" class="w-full object-cover">
                        <div class="p-4">
                            <h3 class="text-[11px] font-bold text-slate-700 truncate">${p.name}</h3>
                            <p class="text-orange-500 font-extrabold text-sm mt-1">₹${p.price}</p>
                        </div>
                    </div>
                </div>`;
        });
    }

    function filterCategory(cat) {
        currentFilter = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.classList.replace('bg-slate-900', 'bg-white');
            btn.classList.replace('text-white', 'text-slate-500');
        });
        document.getElementById('btn-' + cat).classList.add('bg-slate-900', 'text-white');
        renderProducts();
    }

    function toggleWishlist(event, id, name, img, price) {
        event.stopPropagation();
        db.ref(SEC + '/users/' + userPhone + '/wishlist/' + id).set({ name, image: img, price })
        .then(() => document.getElementById('heart-' + id).classList.add('active-heart'));
    }
</script>

</body>
</html>
