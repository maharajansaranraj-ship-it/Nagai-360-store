    <script>
        // ✅ Wishlist-la add panna function
function addToWishlist(productId, productName, productImg, price) {
    const userPhone = localStorage.getItem('user_phone');
    if(!userPhone) {
        alert("Please login first!");
        return;
    }

    // Firebase-la 'wishlist' path-la save pannum
    db.ref('users/' + userPhone + '/wishlist/' + productId).set({
        name: productName,
        image: productImg,
        price: price,
        addedAt: new Date().toISOString()
    }).then(() => {
        alert(productName + " added to Wishlist! ❤️");
    });
}

        // ✅ Real Firebase Config (Same as Login)
        const firebaseConfig = {
            apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.firebasestorage.app",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ✅ Fetch User Data
        const userPhone = localStorage.getItem('user_phone');
        if(userPhone) {
            db.ref('users/' + userPhone).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('username-display').innerText = data.username || "Nagai User";
                    document.getElementById('user-coins').innerText = data.coins || 0;
                }
            });
        } else {
            // Redirect to login if no phone found
            window.location.href = 'index.html'; 
        }
    </script>
