<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="pb-20">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md px-5 py-4 flex items-center justify-between border-b border-gray-100">
        <div class="flex items-center gap-2">
            <img src="1000871212.jpg" alt="Logo" class="w-10 h-10 rounded-full shadow-md">
            <span class="font-bold text-xl tracking-tight text-slate-800">NAGAI <span class="text-orange-500">360</span></span>
        </div>
        <div class="flex gap-4">
            <button class="text-slate-600"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></button>
            <button class="text-slate-600 relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                <span class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center">2</span>
            </button>
        </div>
    </header>

    <div class="flex overflow-x-auto gap-3 p-5 no-scrollbar">
        <button class="flex-shrink-0 px-6 py-2 bg-slate-900 text-white rounded-full text-sm font-semibold">All</button>
        <button class="flex-shrink-0 px-6 py-2 bg-white border border-slate-200 rounded-full text-sm font-semibold">New Arrivals</button>
        <button class="flex-shrink-0 px-6 py-2 bg-white border border-slate-200 rounded-full text-sm font-semibold">Men</button>
        <button class="flex-shrink-0 px-6 py-2 bg-white border border-slate-200 rounded-full text-sm font-semibold">Women</button>
        <button class="flex-shrink-0 px-6 py-2 bg-white border border-slate-200 rounded-full text-sm font-semibold">Trending</button>
    </div>

    <main class="px-4 grid grid-cols-2 gap-4">
        
        <div class="product-card bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 transition-all">
            <div class="relative h-56 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1000" class="w-full h-full object-cover transition-transform duration-500">
                <button class="absolute top-3 right-3 bg-white/80 p-2 rounded-full backdrop-blur-sm shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </button>
            </div>
            <div class="p-4">
                <h3 class="font-bold text-slate-800 text-sm truncate">Yellow Summer Dress</h3>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-orange-600 font-bold">₹899</span>
                    <button class="bg-blue-50 text-blue-700 p-2 rounded-xl text-xs font-bold">+ Add</button>
                </div>
            </div>
        </div>

        <div class="product-card bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 transition-all">
            <div class="relative h-64 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1539109132314-347f08503241?q=80&w=1000" class="w-full h-full object-cover transition-transform duration-500">
                <button class="absolute top-3 right-3 bg-white/80 p-2 rounded-full backdrop-blur-sm shadow-sm text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                </button>
            </div>
            <div class="p-4">
                <h3 class="font-bold text-slate-800 text-sm truncate">Casual Denim Jacket</h3>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-orange-600 font-bold">₹1,499</span>
                    <button class="bg-blue-50 text-blue-700 p-2 rounded-xl text-xs font-bold">+ Add</button>
                </div>
            </div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-8 py-3 flex justify-between items-center shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <button class="text-orange-500 flex flex-col items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
        </button>
        <button class="text-slate-300 flex flex-col items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" /></svg>
        </button>
        <button class="text-slate-300 flex flex-col items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
        </button>
        <button class="text-slate-300 flex flex-col items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
        </button>
    </nav>

</body>
</html>
