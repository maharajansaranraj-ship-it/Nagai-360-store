<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfc; }
        .input-box { @apply w-full p-4 bg-white border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all shadow-sm; }
    </style>
</head>
<body class="pb-40">

    <header class="p-6 flex items-center gap-4 bg-white sticky top-0 z-50 shadow-sm">
        <button onclick="history.back()" class="p-2 bg-slate-100 rounded-full active:scale-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <h1 class="text-xl font-bold text-slate-800">Complete Order</h1>
    </header>

    <main class="p-6 space-y-8">
        
        <section class="space-y-4">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Shipping Details</h2>
            <input type="text" id="cust-name" placeholder="Receiver's Name" class="input-box">
            <textarea id="cust-address" placeholder="Door No, Street Name, Area..." rows="3" class="input-box"></textarea>
            <div class="flex gap-4">
                <input type="number" id="cust-pincode" placeholder="Pincode" class="input-box w-1/2">
                <input type="tel" id="cust-alt-phone" placeholder="Alt Mobile (Optional)" class="input-box w-1/2">
            </div>
        </section>

        <section class="space-y-4">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">Payment Method</h2>
            <div class="p-5 bg-white border-2 border-orange-500 rounded-[2rem] flex items-center gap-4 shadow-sm relative">
                <div class="w-10 h-10 bg-orange-50 rounded-full flex items-center justify-center text-orange-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                </div>
                <div>
                    <p class="font-bold text-slate-800">Cash on Delivery</p>
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Pay at your doorstep</p>
                </div>
                <div class="ml-auto w-6 h-6 bg-orange-500 rounded-full flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
                </div>
            </div>
        </section>

        <section class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-orange-500/10 rounded-full -mr-16 -mt-16"></div>
            <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-6">Payment Summary</h2>
            <div class="space-y-4 relative z-10">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Total Items Price</span>
                    <span id="bill-subtotal" class="font-bold font-mono text-lg">₹0</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Delivery Charges</span>
                    <span class="text-green-400 font-bold uppercase text-[10px] bg-green-400/10 px-3 py-1 rounded-full border border-green-400/20">FREE</span>
                </div>
                <div class="h-px bg-white/10 my-4"></div>
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[10px] font-bold text-slate-500 uppercase">Grand Total</p>
                        <p id="bill-payable" class="text-3xl font-black text-orange-500">₹0</p>
                    </div>
                    <p class="text-[9px] text-slate-400 italic mb-1">Inclusive of all taxes</p>
                </div>
            </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-md border-t border-slate-100 z-[100]">
        <button onclick="placeOrder()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-[2rem] shadow-xl active:scale-95 transition-all uppercase tracking-[0.2em] text-sm">
            Place Order Now
        </button>
    </div>

    <script>
        // ✅ 1. Unified Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.firebasestorage.app",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();
        const userPhone = localStorage.getItem('user_phone');
        let currentTotal = 0;

        // ✅ 2. Fetch Live Cart Data & Calculate Total
        if(userPhone) {
            db.ref('users/' + userPhone + '/cart').on('value', (snapshot) => {
                let total = 0;
                const cartData = snapshot.val();
                
                if(cartData) {
                    Object.keys(cartData).forEach(key => {
                        // Numeric price handle panna
                        const price = parseInt(cartData[key].price) || 0;
                        total += price;
                    });
                }
                
                currentTotal = total;
                document.getElementById('bill-subtotal').innerText = "₹" + total;
                document.getElementById('bill-payable').innerText = "₹" + total;
            });
        } else {
            window.location.href = 'index.html'; // Login-ku thirumba anuppu
        }

        // ✅ 3. Place Order Functionality
        function placeOrder() {
            const name = document.getElementById('cust-name').value.trim();
            const address = document.getElementById('cust-address').value.trim();
            const pincode = document.getElementById('cust-pincode').value.trim();
            const altPhone = document.getElementById('cust-alt-phone').value.trim();

            // Validation
            if(!name || !address || !pincode) {
                alert("Please fill in your name and delivery address!");
                return;
            }

            if(currentTotal === 0) {
                alert("Your cart is empty!");
                window.location.href = 'home.html';
                return;
            }

            // Generate Unique Order ID
            const orderID = "NG" + Date.now().toString().slice(-6);

            const finalOrderData = {
                orderID: orderID,
                customerName: name,
                primaryPhone: userPhone,
                alternatePhone: altPhone || "N/A",
                fullAddress: address,
                pincode: pincode,
                totalBill: currentTotal,
                paymentMode: "Cash on Delivery",
                orderDate: new Date().toLocaleString(),
                status: "Order Placed"
            };

            // Save to Master Orders List (For Admin)
            db.ref('orders/' + orderID).set(finalOrderData).then(() => {
                
                // Save to User's Personal History
                db.ref('users/' + userPhone + '/myOrders/' + orderID).set(finalOrderData);
                
                // Clear the Cart after successful order
                db.ref('users/' + userPhone + '/cart').remove();

                alert("Success! Your order " + orderID + " has been placed.");
                window.location.href = 'profile.html';
            }).catch((error) => {
                console.error("Order Error: ", error);
                alert("Order failed! Please check your connection.");
            });
        }
    </script>
</body>
</html>
