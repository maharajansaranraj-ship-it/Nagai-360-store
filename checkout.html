<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfc; }
        .input-box { @apply w-full p-4 bg-white border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all shadow-sm mb-4; }
        .pay-card { @apply p-4 border-2 border-slate-50 rounded-2xl flex items-center gap-3 transition-all cursor-pointer; }
        .selected-pay { @apply border-orange-500 bg-orange-50/30; }
    </style>
</head>
<body class="pb-40">

    <div id="loading-overlay" class="fixed inset-0 bg-white/90 backdrop-blur-md z-[200] hidden flex flex-col items-center justify-center">
        <div id="loader-content" class="flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="font-black text-slate-800 uppercase tracking-widest text-xs">Verifying Details...</p>
        </div>
    </div>

    <header class="p-6 flex items-center gap-4 bg-white sticky top-0 z-50 shadow-sm">
        <button onclick="history.back()" class="p-2 bg-slate-100 rounded-full active:scale-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <h1 class="text-xl font-bold text-slate-800">Final Step</h1>
    </header>

    <main class="p-6 space-y-8">
        
        <section>
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-1">Shipping Details</h2>
            <input type="text" id="cust-name" placeholder="Full Name" class="input-box">
            <textarea id="cust-address" placeholder="Complete Address (House No, Street, Landmark)" rows="3" class="input-box"></textarea>
            <div class="flex gap-4">
                <input type="number" id="cust-pincode" placeholder="Pincode" class="input-box w-1/2">
                <input type="tel" id="cust-alt-phone" placeholder="Alt Phone (Optional)" class="input-box w-1/2">
            </div>
        </section>

        <section>
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-1">Payment Method</h2>
            <div class="space-y-3">
                <div onclick="selectPayment('UPI', this)" class="pay-card selected-pay">
                    <div class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-xl">📱</div>
                    <div class="flex-1"><p class="font-bold text-slate-800 text-sm">GPay / PhonePe / UPI</p></div>
                    <div class="radio-circle w-5 h-5 border-2 border-orange-500 rounded-full flex items-center justify-center">
                        <div class="w-2.5 h-2.5 bg-orange-500 rounded-full"></div>
                    </div>
                </div>
                <div onclick="selectPayment('COD', this)" class="pay-card">
                    <div class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-xl">💵</div>
                    <div class="flex-1"><p class="font-bold text-slate-800 text-sm">Cash on Delivery</p></div>
                    <div class="radio-circle w-5 h-5 border-2 border-slate-200 rounded-full"></div>
                </div>
            </div>
        </section>

        <section class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl overflow-hidden">
            <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-6">Order Summary</h2>
            <div class="space-y-4">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Items Total</span>
                    <span id="bill-subtotal" class="font-bold font-mono">₹0</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Recharge & Tax</span>
                    <span class="text-orange-400 font-bold font-mono">+₹80</span>
                </div>
                <div class="h-px bg-white/10 my-4"></div>
                <div class="flex justify-between items-center">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Total Payable</p>
                    <p id="bill-payable" class="text-3xl font-black text-orange-500">₹0</p>
                </div>
            </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t border-slate-100 z-[100]">
        <button onclick="placeOrder()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-[2rem] shadow-xl active:scale-95 transition-all uppercase tracking-widest text-xs">
            Confirm Order
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
            authDomain: "ff-id-store-dab0f.firebaseapp.com",
            projectId: "ff-id-store-dab0f",
            storageBucket: "ff-id-store-dab0f.firebasestorage.app",
            messagingSenderId: "655049193530",
            appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
            databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userPhone = localStorage.getItem('user_phone');
        
        let selectedMethod = "UPI";
        let subtotal = 0;
        let firstItemImg = ""; // To store the image for admin
        const rechargeFee = 80;

        // ✅ Fetch Cart and get Image
        db.ref('users/' + userPhone + '/cart').on('value', (snap) => {
            subtotal = 0;
            const data = snap.val();
            if(data) {
                const items = Object.values(data);
                items.forEach(item => subtotal += parseInt(item.price));
                
                // Get the image of the first item in cart
                if(items.length > 0) {
                    firstItemImg = items[0].img || items[0].image || "";
                }

                document.getElementById('bill-subtotal').innerText = "₹" + subtotal;
                document.getElementById('bill-payable').innerText = "₹" + (subtotal + rechargeFee);
            }
        });

        function selectPayment(method, el) {
            selectedMethod = method;
            document.querySelectorAll('.pay-card').forEach(c => {
                c.classList.remove('selected-pay');
                c.querySelector('.radio-circle').innerHTML = "";
                c.querySelector('.radio-circle').className = "radio-circle w-5 h-5 border-2 border-slate-200 rounded-full";
            });
            el.classList.add('selected-pay');
            el.querySelector('.radio-circle').className = "radio-circle w-5 h-5 border-2 border-orange-500 rounded-full flex items-center justify-center";
            el.querySelector('.radio-circle').innerHTML = '<div class="w-2.5 h-2.5 bg-orange-500 rounded-full"></div>';
        }

        function placeOrder() {
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-address').value;
            const pin = document.getElementById('cust-pincode').value;

            if(!name || !addr || !pin) return alert("Please fill all details!");

            document.getElementById('loading-overlay').classList.remove('hidden');

            const orderID = "NG" + Math.floor(100000 + Math.random() * 900000);
            
            // ✅ Added productImg here so Admin can see it
            const orderData = {
                orderID: orderID,
                customerName: name,
                primaryPhone: userPhone,
                fullAddress: addr,
                pincode: pin,
                totalBill: (subtotal + rechargeFee),
                paymentMode: selectedMethod,
                productImg: firstItemImg, 
                status: "Ordered",
                orderDate: new Date().toLocaleString()
            };

            setTimeout(() => {
                db.ref('orders/' + orderID).set(orderData).then(() => {
                    db.ref('users/' + userPhone + '/myOrders/' + orderID).set(orderData);
                    db.ref('users/' + userPhone + '/cart').remove();
                    
                    document.getElementById('loader-content').innerHTML = `
                        <div class="text-6xl mb-4 animate-bounce">✅</div>
                        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tighter">Ordered Successfully!</h2>
                        <p class="text-slate-400 text-[10px] font-bold mt-2 uppercase tracking-widest">Checking your profile...</p>
                    `;
                    
                    setTimeout(() => {
                        window.location.href = 'profile.html';
                    }, 2000);
                });
            }, 2500);
        }
    </script>
</body>
</html>
