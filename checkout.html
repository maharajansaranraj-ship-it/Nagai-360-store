<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nagai 360 | Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfc; }
        .input-box { @apply w-full p-4 bg-white border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-orange-500 transition-all shadow-sm mb-4 text-sm; }
        .pay-card { @apply p-4 border-2 border-slate-50 rounded-2xl flex items-center gap-3 transition-all cursor-pointer; }
        .selected-pay { @apply border-orange-500 bg-orange-50/30; }
    </style>
</head>
<body class="pb-40">

    <div id="loading-overlay" class="fixed inset-0 bg-white/95 backdrop-blur-md z-[200] hidden flex flex-col items-center justify-center">
        <div id="loader-content" class="flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p id="loader-text" class="font-black text-slate-800 uppercase tracking-widest text-[10px]">Processing Order...</p>
        </div>
    </div>

    <header class="p-6 flex items-center gap-4 bg-white sticky top-0 z-50 shadow-sm">
        <button onclick="history.back()" class="p-2 bg-slate-100 rounded-full active:scale-90 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <h1 class="text-xl font-bold text-slate-800 tracking-tight">Checkout</h1>
    </header>

    <main class="p-6 space-y-8">
        <section>
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-1">Shipping Details</h2>
            <input type="text" id="cust-name" placeholder="Full Name" class="input-box">
            <textarea id="cust-address" placeholder="Complete Address (House No, Street, Landmark)" rows="3" class="input-box"></textarea>
            <div class="flex gap-4">
                <input type="number" id="cust-pincode" placeholder="Pincode" class="input-box w-1/2">
                <input type="tel" id="cust-alt-phone" placeholder="Alt Phone (Optional)" class="input-box w-1/2">
            </div>
        </section>

        <section id="product-preview-sec" class="hidden">
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-1">Items in Order</h2>
            <div id="items-list" class="space-y-3"></div>
        </section>

        <section>
            <h2 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-1">Payment Method</h2>
            <div class="space-y-3">
                <div onclick="selectPayment('UPI', this)" class="pay-card selected-pay">
                    <div class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-xl">📱</div>
                    <div class="flex-1 text-sm font-bold text-slate-800">GPay / PhonePe / UPI</div>
                </div>
                <div onclick="selectPayment('COD', this)" class="pay-card">
                    <div class="w-10 h-10 bg-white rounded-xl shadow-sm flex items-center justify-center text-xl">💵</div>
                    <div class="flex-1 text-sm font-bold text-slate-800">Cash on Delivery</div>
                </div>
            </div>
        </section>

        <section class="bg-slate-900 rounded-[2.5rem] p-8 text-white shadow-2xl relative overflow-hidden">
            <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-6">Price Details</h2>
            <div class="space-y-4">
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Items Total</span>
                    <span id="bill-subtotal" class="font-bold">₹0</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Delivery & Tax</span>
                    <span class="text-orange-400 font-bold">+₹80</span>
                </div>
                <div class="flex justify-between text-sm">
                    <span class="text-slate-400">Selected Size</span>
                    <span id="bill-size" class="text-orange-500 font-black uppercase tracking-widest italic">---</span>
                </div>

                <div class="h-px bg-white/10 my-4"></div>
                <div class="flex justify-between items-center">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Total Amount</p>
                    <p id="bill-payable" class="text-3xl font-black text-orange-500">₹0</p>
                </div>
            </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-6 bg-white border-t border-slate-100 z-[100]">
        <button onclick="handlePlaceOrder()" class="w-full bg-orange-500 text-white font-bold py-5 rounded-[2rem] shadow-xl active:scale-95 transition-all uppercase tracking-widest text-xs">
            Confirm Order
        </button>
    </div>
<script>
    // 1. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCAilX0GQnN127N1SxCJ861qMxAO0svNUQ",
        authDomain: "ff-id-store-dab0f.firebaseapp.com",
        projectId: "ff-id-store-dab0f",
        storageBucket: "ff-id-store-dab0f.firebasestorage.app",
        messagingSenderId: "655049193530",
        appId: "1:655049193530:web:978aaf75e10dd26bb8dd03",
        databaseURL: "https://ff-id-store-dab0f-default-rtdb.firebaseio.com"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const userPhone = localStorage.getItem('user_phone');
    
    let selectedMethod = "UPI";
    let subtotal = 0;
    let cartItems = []; 
    const rechargeFee = 80;
    const myUpiId = "yourname@okicici"; // 👈 UNGA UPI ID INGA MATHUNGA

    // 2. UI Update Function (Calculates Subtotal and Size)
    function updateUI() {
        const listDiv = document.getElementById('items-list');
        listDiv.innerHTML = "";
        subtotal = 0;
        let finalSize = "N/A";

        if(cartItems.length > 0) {
            document.getElementById('product-preview-sec').classList.remove('hidden');
            cartItems.forEach((item, index) => {
                subtotal += parseInt(item.price);
                // Item size-ah correct-ah yedukkurom
                const itemSize = item.size || item.selectedSize || 'M';
                if(index === 0) finalSize = itemSize;

                listDiv.innerHTML += `
                    <div class="flex items-center gap-4 bg-white p-3 rounded-2xl border border-slate-100">
                        <img src="${item.img || item.image}" class="w-12 h-12 object-cover rounded-xl">
                        <div class="flex-1">
                            <h4 class="text-xs font-bold text-slate-800">${item.name}</h4>
                            <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Size: ${itemSize}</p>
                        </div>
                        <p class="text-xs font-black text-slate-800">₹${item.price}</p>
                    </div>`;
            });

            document.getElementById('bill-subtotal').innerText = "₹" + subtotal;
            document.getElementById('bill-payable').innerText = "₹" + (subtotal + rechargeFee);
            document.getElementById('bill-size').innerText = finalSize;
        }
    }

    // 3. Load Data (From Cart or Direct Buy)
    db.ref('users/' + userPhone + '/cart').once('value', (snap) => {
        const data = snap.val();
        if(data) {
            cartItems = Object.values(data);
            updateUI();
        } else {
            const directItem = localStorage.getItem('checkout_item');
            if(directItem) {
                cartItems = [JSON.parse(directItem)];
                updateUI();
            }
        }
    });

    // 4. Payment Selection
    function selectPayment(method, el) {
        selectedMethod = method;
        document.querySelectorAll('.pay-card').forEach(c => c.classList.remove('selected-pay'));
        el.classList.add('selected-pay');
    }

    // 5. Handle Place Order (UPI Logic Included)
    function handlePlaceOrder() {
        const name = document.getElementById('cust-name').value;
        const addr = document.getElementById('cust-address').value;
        const pin = document.getElementById('cust-pincode').value;

        if(!name || !addr || !pin) return alert("Please fill shipping details!");
        if(cartItems.length === 0) return alert("Cart is empty!");

        const totalAmount = subtotal + rechargeFee;

        if(selectedMethod === "UPI") {
            const upiUrl = `upi://pay?pa=${myUpiId}&pn=Nagai360&am=${totalAmount}&cu=INR`;
            window.location.href = upiUrl;
            // Payment screen redirect aaga 4 sec wait panni appuram order save aagum
            setTimeout(() => { placeOrder(name, addr, pin, totalAmount); }, 4000);
        } else {
            placeOrder(name, addr, pin, totalAmount);
        }
    }

    // 6. Final Order Save to Firebase
    function placeOrder(name, addr, pin, totalAmount) {
        document.getElementById('loading-overlay').classList.remove('hidden');
        const orderID = "NG" + Math.floor(100000 + Math.random() * 900000);
        
        const firstItem = cartItems[0];
        
        // ✅ ADMIN LOGIC MATCHING KEYS
        const orderData = {
            orderID: orderID, 
            customerName: name, 
            primaryPhone: userPhone,
            fullAddress: `${addr}, Pin: ${pin}`,
            totalBill: totalAmount, // <--- Amount for Admin
            paymentMode: selectedMethod,
            productImg: firstItem.img || firstItem.image,
            productName: firstItem.name,
            productID: firstItem.pid || firstItem.productID || "", 
            size: firstItem.size || firstItem.selectedSize || "M", // <--- Size for Admin
            status: "Order Placed",
            orderDate: new Date().toLocaleString(),
            timestamp: Date.now()
        };

        // Save to Main Admin Orders
        db.ref('orders/' + orderID).set(orderData).then(() => {
            // Save to User's History
            db.ref('users/' + userPhone + '/myOrders/' + orderID).set(orderData);
            
            // Cleanup
            db.ref('users/' + userPhone + '/cart').remove();
            localStorage.removeItem('checkout_item');
            
            document.getElementById('loader-text').innerText = "Order Successful! 🛍️";
            setTimeout(() => { window.location.href = 'profile.html'; }, 2000);
        }).catch((err) => {
            alert("Order Error: " + err.message);
            document.getElementById('loading-overlay').classList.add('hidden');
        });
    }
</script>

                


</body>
</html>
